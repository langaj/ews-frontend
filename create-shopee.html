<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>创建任务(虾皮) - EWS</title>
<link rel="stylesheet" href="/css/style.css">
<style>.ref-row{display:flex;gap:10px;margin-top:8px}.ref-zone{aspect-ratio:1;padding:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;flex:1;min-width:0}.ref-placeholder .upload-text{font-size:13px;color:var(--gray-500)}</style>
</head><body>
<script src="/js/nav.js"></script>
<div class="app-container">
<div class="page-header"><h1 class="page-title">创建新任务 (虾皮)</h1></div>
<div class="card"><div class="card-body">
<form id="productForm" onsubmit="handleCreate(event)">
  <div class="form-group">
    <label class="form-label">任务名称 <span class="required">*</span></label>
    <input type="text" class="form-input" id="productName" required placeholder="如：手机壳批次">
  </div>
  <div class="form-group">
    <label class="form-label">参考图 <span class="required">*</span></label>
    <div class="form-hint">核心参考图必填，辅助图可选（最多4张），用于AI生成商品图</div>
    <div class="ref-row" id="refRow"></div>
    <input type="hidden" id="referenceImage" required>
    <input type="hidden" id="auxiliaryImages">
  </div>
  <div class="form-group">
    <label class="form-label">商品描述</label>
    <textarea class="form-textarea" id="productDesc" rows="4" placeholder="商品功能、材质、特点等"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">参考标题 <span class="required">*</span></label>
    <textarea class="form-textarea" id="referenceTitle" rows="3" placeholder="给 AI 参考的商品标题，可每行一个"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">主图生成描述 <span class="optional">（建议）</span></label>
    <textarea class="form-textarea" id="mainDescription" rows="3" placeholder="封面图生成的描述，如场景、光线要求"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">详情图生成描述 <span class="optional">（建议）</span></label>
    <textarea class="form-textarea" id="detailDescription" rows="3" placeholder="商品图生成的描述"></textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">主图/附图总量</label>
      <input type="number" class="form-input" id="mainImageCount" value="5" min="5" max="9" required>
      <div class="form-hint">默认5(1封面+4商品图)，最多9</div>
    </div>
    <div class="form-group">
      <label class="form-label">详情图数量</label>
      <input type="number" class="form-input" id="detailImageCount" value="5" min="5" max="9" required>
      <div class="form-hint">默认5，最多9</div>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">生成模式</label>
    <div style="display:flex;gap:16px;padding:8px 0">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="radio" name="genMode" value="full" checked>
        <span style="font-weight:500">全量生成</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="radio" name="genMode" value="dedup">
        <span style="font-weight:500">去重生成</span>
      </label>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">生成套数 <span class="required">*</span></label>
      <input type="number" class="form-input" id="generateCount" value="1" min="1" max="100" required>
    </div>
    <div class="form-group">
      <label class="form-label">分类 ID</label>
      <input type="text" class="form-input" id="categoryId" placeholder="如：120055">
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">来自 Shopee Seller Center 的 Category Tree；不知道可留空由平台推荐。</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">变体数量</label>
      <input type="number" class="form-input" id="variantCount" value="1" min="1" max="50" onchange="updateVariants()">
    </div>
    <div class="form-group">
      <label class="form-label">品牌 ID <span class="optional">（可留空）</span></label>
      <input type="text" class="form-input" id="brandId" placeholder="当前基础模板不导出品牌 ID">
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">类目专用模板可能要求有效品牌或 no brand；当前可留空。</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">重量(kg) <span class="required">*</span></label>
      <input type="number" class="form-input" id="weightKg" value="0.1" step="0.01" min="0" required>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">长(cm)</label><input type="number" class="form-input" id="length" step="0.1" min="0"></div>
    <div class="form-group"><label class="form-label">宽(cm)</label><input type="number" class="form-input" id="width" step="0.1" min="0"></div>
    <div class="form-group"><label class="form-label">高(cm)</label><input type="number" class="form-input" id="height" step="0.1" min="0"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">GTIN</label><input type="text" class="form-input" id="gtin" placeholder="商品条形码"></div>
    <div class="form-group"><label class="form-label">HS Code</label><input type="text" class="form-input" id="hsCode" placeholder="4/6/8位数字"></div>
  </div>
  <hr style="margin:20px 0">
  <h4 style="margin-bottom:16px;color:var(--gray-700)">变体设置 (颜色+尺码二维)</h4>
  <div class="form-row">
    <div class="form-group"><label class="form-label">颜色(变体名)</label><input type="text" class="form-input" id="varName1" value="Color" placeholder="第一层规格名"></div>
    <div class="form-group"><label class="form-label">尺码(第二层)</label><input type="text" class="form-input" id="varName2" placeholder="如：Size"></div>
  </div>
  <div id="variantsContainer"></div>
  <hr style="margin:20px 0">
  <h4 style="margin-bottom:16px;color:var(--gray-700)">物流渠道</h4>
  <div class="form-row" id="shippingChannels"></div>
  <div style="display:flex;gap:12px;margin-top:24px">
    <button type="submit" class="btn btn-primary" id="submitBtn">创建任务</button>
    <a href="/" class="btn btn-outline">取消</a>
  </div>
</form>
</div></div></div>
<script src="/js/api.js"></script>
<script>
var refFiles=[];
var variantImgFiles=[];
var channels=[{id:'5000',label:'Hỏa Tốc'},{id:'5001',label:'Nhanh'},{id:'5004',label:'Hàng Cồng Kềnh'},{id:'5012',label:'Trong Ngày'},{id:'5115',label:'Hỏa Tốc - Ưu Tiên'},{id:'50039',label:'Tủ nhận hàng - Viettel Smartbox'},{id:'50052',label:'Tủ nhận hàng - SPX'}];

document.addEventListener('DOMContentLoaded',async()=>{if(!await requireAuth())return;refreshNavCredits();initRefSlots();updateVariants();initShipping()});
function initShipping(){var h='';for(var c of channels)h+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" class="shipping-chk" value="'+c.id+'"> '+c.label+'</label>';document.getElementById('shippingChannels').innerHTML=h;}
function initRefSlots(){
  var labels=['核心','辅助1','辅助2','辅助3','辅助4'];var html='';
  for(var i=0;i<5;i++){
    html+='<div class="ref-zone upload-zone" id="refZone'+i+'" onclick="document.getElementById(\'refInput'+i+'\').click()">';
    html+='<input type="file" id="refInput'+i+'" accept="image/*" style="display:none" onchange="handleRefUpload(event,'+i+')">';
    html+='<div id="refPlaceholder'+i+'" class="ref-placeholder"><div class="upload-text">'+(i===0?'点击上传\n核心参考图\n(必填)':'点击上传\n辅助参考图\n(可选)')+'</div></div>';
    html+='<div id="refPreview'+i+'" style="display:none;width:100%"><img id="refPreviewImg'+i+'" src="" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px"></div>';
    html+='</div><div style="font-size:11px;color:var(--gray-500);text-align:center;margin-top:4px">'+labels[i]+'</div>';
  }
  document.getElementById('refRow').innerHTML=html;
}
function handleRefUpload(e,i){var f=e.target.files[0];if(!f)return;refFiles[i]=f;
  var reader=new FileReader();reader.onload=function(e2){
    document.getElementById('refPlaceholder'+i).style.display='none';
    document.getElementById('refPreview'+i).style.display='block';
    document.getElementById('refPreviewImg'+i).src=e2.target.result;
    document.getElementById('refZone'+i).classList.add('has-image');
  };reader.readAsDataURL(f);
}
function updateVariants(){
  var count=parseInt(document.getElementById('variantCount').value)||1;
  var container=document.getElementById('variantsContainer');
  var existing=container.querySelectorAll('.v-item');
  var html='';
  for(var i=0;i<count;i++){
    var ed=existing[i];
    var o1=ed?ed.querySelector('.v-o1')?.value||'':'';
    var o2=ed?ed.querySelector('.v-o2')?.value||'':'';
    var price=ed?ed.querySelector('.v-pr')?.value||'':'';
    var stock=ed?ed.querySelector('.v-st')?.value||'':'';
    var sku=ed?ed.querySelector('.v-sk')?.value||'':'';
    var hasImg=!!variantImgFiles[i];
    html+='<div class="variant-item v-item"><div class="variant-header"><span class="variant-number">变体 #'+(i+1)+'</span>'+(count>1?'<button type="button" class="variant-remove" onclick="removeVariant('+i+')">删除</button>':'')+'</div>';
    html+='<div class="form-row"><div class="form-group"><label style="font-size:13px">颜色 <span class="required">*</span></label><input class="form-input v-o1" placeholder="如：红色" value="'+escapeHtml(o1)+'" required></div>';
    html+='<div class="form-group"><label style="font-size:13px">尺码</label><input class="form-input v-o2" placeholder="如：M" value="'+escapeHtml(o2)+'"></div></div>';
    html+='<div class="form-row"><div class="form-group"><label style="font-size:13px">价格 <span class="required">*</span></label><input type="number" class="form-input v-pr" step="0.01" min="0" value="'+escapeHtml(price)+'" required></div>';
    html+='<div class="form-group"><label style="font-size:13px">库存</label><input type="number" class="form-input v-st" min="0" value="'+escapeHtml(stock||'0')+'"></div></div>';
    html+='<div class="form-group"><label style="font-size:13px">SKU</label><input class="form-input v-sk" placeholder="商家SKU" value="'+escapeHtml(sku)+'"></div>';
    html+='<div class="form-group"><label style="font-size:13px">SKU参考图 <span class="required">*</span></label>';
    html+='<div class="upload-zone'+(hasImg?' has-image':'')+'" onclick="document.getElementById(\'variantInput'+i+'\').click()">';
    html+='<input type="file" id="variantInput'+i+'" accept="image/*" style="display:none" onchange="handleVariantUpload(event,'+i+')">';
    html+='<div class="variant-placeholder"'+(hasImg?' style="display:none"':'')+'><div class="upload-text">点击上传SKU参考图</div></div>';
    html+='<div class="variant-preview"'+(hasImg?'':' style="display:none"')+'><img id="variantPreviewImg'+i+'" src="" style="max-width:100%;max-height:150px;border-radius:6px"></div></div></div></div>';
  }
  container.innerHTML=html;
}
function removeVariant(i){
  var c=parseInt(document.getElementById('variantCount').value)||1;
  if(c<=1)return;document.getElementById('variantCount').value=c-1;updateVariants();
}
function handleVariantUpload(e,i){var f=e.target.files[0];if(!f)return;variantImgFiles[i]=f;
  var reader=new FileReader();reader.onload=function(e2){
    var item=document.querySelectorAll('.v-item')[i];
    item.querySelector('.variant-placeholder').style.display='none';
    item.querySelector('.variant-preview').style.display='block';
    item.querySelector('.upload-zone').classList.add('has-image');
    document.getElementById('variantPreviewImg'+i).src=e2.target.result;
  };reader.readAsDataURL(f);
}
async function uploadFile(taskId,file,folder){
  var fd=new FormData();fd.append('file',file);fd.append('folder',folder);fd.append('task_id',taskId);
  var token=localStorage.getItem('ews_token');
  var res=await fetch(API_BASE+'/api/upload',{method:'POST',headers:token?{'Authorization':'Bearer '+token}:{},body:fd});
  return await res.json();
}
async function handleCreate(e){
  e.preventDefault();
  var name=document.getElementById('productName').value.trim();
  var referenceTitle=document.getElementById('referenceTitle').value.trim();
  if(!name){showToast('请填写商品名称','error');return}
  if(!referenceTitle){showToast('请填写参考标题','error');return}
  if(!refFiles[0]){showToast('请上传核心参考图','error');return}
  var varItems=document.querySelectorAll('.v-item');
  for(var item of varItems){if(!item.querySelector('.v-o1').value.trim()){showToast('请填写所有变体颜色','error');return}}
  for(var vi=0;vi<varItems.length;vi++){if(!variantImgFiles[vi]){showToast('请上传变体 #'+(vi+1)+' 的SKU参考图','error');return}}
  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='初始化...';
  var initRes=await API.initTask('shopee');
  if(!initRes.success){showToast(initRes.error||'初始化失败','error');btn.disabled=false;btn.textContent='创建商品';return}
  var taskId=initRes.task_id;btn.textContent='上传参考图...';
  var auxUrls=[];var refImg='';
  for(var ri=0;ri<5;ri++){var rf=refFiles[ri];if(!rf)continue;
    var upRes=await uploadFile(taskId,rf,'references');if(!upRes.success){showToast('参考图上传失败','error');btn.disabled=false;return}
    if(ri===0)refImg=upRes.url||upRes.key;else auxUrls.push(upRes.url||upRes.key);
  }
  var variations=[];
  for(var i=0;i<varItems.length;i++){
    btn.textContent='上传SKU参考图 '+(i+1)+'/'+varItems.length+'...';
    var skuImgUrl='';var skuFile=variantImgFiles[i];
    if(skuFile){var sRes=await uploadFile(taskId,skuFile,'variants');if(sRes.success) skuImgUrl=sRes.url||sRes.key;}
    variations.push({
      option1:varItems[i].querySelector('.v-o1').value.trim(),
      option2:varItems[i].querySelector('.v-o2').value.trim(),
      image_per_variation:skuImgUrl,
      price:parseFloat(varItems[i].querySelector('.v-pr').value)||0,
      stock:parseInt(varItems[i].querySelector('.v-st').value)||0,
      sku:varItems[i].querySelector('.v-sk').value.trim(),
    });
  }
  btn.textContent='提交...';
  var submitRes=await API.updateTask(taskId,{
    name,description:document.getElementById('productDesc').value.trim(),reference_title:referenceTitle,
    main_description:document.getElementById('mainDescription').value.trim(),
    detail_description:document.getElementById('detailDescription').value.trim(),
    reference_image:refImg,auxiliary_images:JSON.stringify(auxUrls),
    cover_image:refImg,images:JSON.stringify(auxUrls),
    main_image_count:parseInt(document.getElementById('mainImageCount').value),
    detail_image_count:parseInt(document.getElementById('detailImageCount').value),
    generate_count:parseInt(document.getElementById('generateCount').value),
    mode:document.querySelector('input[name="genMode"]:checked').value,
    weight_kg:parseFloat(document.getElementById('weightKg').value)||0,
    category_id:document.getElementById('categoryId').value.trim(),
    brand_id:document.getElementById('brandId').value.trim(),
    length_cm:parseFloat(document.getElementById('length').value)||null,
    width_cm:parseFloat(document.getElementById('width').value)||null,
    height_cm:parseFloat(document.getElementById('height').value)||null,
    gtin:document.getElementById('gtin').value.trim(),
    hs_code:document.getElementById('hsCode').value.trim(),
    variation_name1:document.getElementById('varName1').value.trim(),
    variation_name2:document.getElementById('varName2').value.trim(),
    shipping_channels:JSON.stringify(Array.from(document.querySelectorAll('.shipping-chk:checked')).map(function(cb){return cb.value})),
    variations:variations,
  });
  if(submitRes.success){showToast('商品创建成功！','success');setTimeout(()=>{window.location.href='/'},1500)}
  else{showToast(submitRes.error||'提交失败','error');btn.disabled=false;btn.textContent='创建商品'}
}
function escapeHtml(s){if(s===undefined||s===null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body></html>
