<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>创建任务(虾皮) - EWS</title>
<link rel="stylesheet" href="/css/style.css">
<style>.ref-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-top:8px}.ref-slot{min-width:0}.ref-zone{width:100%;aspect-ratio:1;padding:8px;display:flex;align-items:center;justify-content:center;flex-direction:column;min-height:0}.ref-preview{display:none;width:100%;height:100%}.ref-preview img{width:100%;height:100%;object-fit:cover;border-radius:4px}.ref-placeholder .upload-text{font-size:13px;color:var(--gray-500);white-space:pre-line;line-height:1.5}.ref-label{font-size:11px;color:var(--gray-500);text-align:center;margin-top:4px}.spec-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 10px}.spec-toolbar h4{margin:0;color:var(--gray-700)}.spec-option-row{display:grid;grid-template-columns:minmax(180px,1fr) minmax(180px,260px) auto;gap:12px;align-items:end;padding:14px 0;border-bottom:1px solid var(--gray-200)}.spec-option-row:last-child{border-bottom:0}.spec-upload{min-height:72px;padding:8px}.spec-upload img{width:64px;height:56px;object-fit:cover}.spec-switch{display:flex;align-items:center;gap:8px;margin:18px 0 12px;cursor:pointer}.combo-summary{font-size:13px;color:var(--gray-500)}.combo-disabled{opacity:.58}.combo-disabled input:not(.v-enabled),.combo-disabled select{pointer-events:none}.combo-empty{padding:18px 0;color:var(--gray-500);font-size:13px}.btn-compact{padding:7px 11px;font-size:13px}@media(max-width:760px){.ref-row{grid-template-columns:repeat(2,minmax(0,1fr))}.spec-option-row{grid-template-columns:1fr}.spec-option-row .variant-remove{justify-self:start}}</style>
</head><body>
<script src="/js/nav.js"></script>
<div class="app-container">
<div class="page-header"><h1 class="page-title">创建新任务 (虾皮)</h1></div>
<div class="card"><div class="card-body">
<form id="productForm" onsubmit="handleCreate(event)">
  <div class="form-group">
    <label class="form-label">任务名称 <span class="required">*</span></label>
    <input type="text" class="form-input" id="productName" required placeholder="如：手机壳批次">
  </div>
  <div class="form-group">
    <label class="form-label">参考图 <span class="required">*</span></label>
    <div class="form-hint">核心参考图必填，辅助图可选（最多4张），用于AI生成商品图</div>
    <div class="ref-row" id="refRow"></div>
    <input type="hidden" id="referenceImage" required>
    <input type="hidden" id="auxiliaryImages">
  </div>
  <div class="form-group">
    <label class="form-label">商品描述</label>
    <textarea class="form-textarea" id="productDesc" rows="4" placeholder="商品功能、材质、特点等"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">参考标题 <span class="required">*</span></label>
    <textarea class="form-textarea" id="referenceTitle" rows="3" placeholder="给 AI 参考的商品标题，可每行一个"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">主图生成描述 <span class="optional">（建议）</span></label>
    <textarea class="form-textarea" id="mainDescription" rows="3" placeholder="封面图生成的描述，如场景、光线要求"></textarea>
  </div>
  <div class="form-group">
    <label class="form-label">详情图生成描述 <span class="optional">（建议）</span></label>
    <textarea class="form-textarea" id="detailDescription" rows="3" placeholder="商品图生成的描述"></textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">主图/附图总量</label>
      <input type="number" class="form-input" id="mainImageCount" value="9" min="5" max="9" required>
      <div class="form-hint">默认9(1封面+8附图)，最多9；去重模式第2套开始只生成封面图</div>
    </div>
    <div class="form-group">
      <label class="form-label">详情图数量</label>
      <input type="number" class="form-input" id="detailImageCount" value="0" min="0" max="9" required>
      <div class="form-hint">Shopee基础模板不导出详情图，默认0；需要本地打包素材时可生成</div>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">生成模式</label>
    <div style="display:flex;gap:16px;padding:8px 0">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="radio" name="genMode" value="full" checked>
        <span style="font-weight:500">全量生成</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <input type="radio" name="genMode" value="dedup">
        <span style="font-weight:500">去重生成</span>
      </label>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">生成套数 <span class="required">*</span></label>
      <input type="number" class="form-input" id="generateCount" value="1" min="1" max="100" required>
    </div>
    <div class="form-group">
      <label class="form-label">分类 ID</label>
      <input type="text" class="form-input" id="categoryId" placeholder="如：120055">
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">来自 Shopee Seller Center 的 Category Tree；不知道可留空由平台推荐。</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">品牌 ID <span class="optional">（可留空）</span></label>
      <input type="text" class="form-input" id="brandId" placeholder="当前基础模板不导出品牌 ID">
      <div style="font-size:12px;color:var(--gray-500);margin-top:4px">类目专用模板可能要求有效品牌或 no brand；当前可留空。</div>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label class="form-label">重量(kg) <span class="required">*</span></label>
      <input type="number" class="form-input" id="weightKg" value="0.1" step="0.01" min="0" required>
    </div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">长(cm)</label><input type="number" class="form-input" id="length" step="0.1" min="0"></div>
    <div class="form-group"><label class="form-label">宽(cm)</label><input type="number" class="form-input" id="width" step="0.1" min="0"></div>
    <div class="form-group"><label class="form-label">高(cm)</label><input type="number" class="form-input" id="height" step="0.1" min="0"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">GTIN</label><input type="text" class="form-input" id="gtin" placeholder="商品条形码"></div>
    <div class="form-group"><label class="form-label">HS Code</label><input type="text" class="form-input" id="hsCode" placeholder="4/6/8位数字"></div>
  </div>
  <hr style="margin:20px 0">
  <h4 style="margin-bottom:16px;color:var(--gray-700)">商品规格</h4>
  <div class="form-row">
    <div class="form-group"><label class="form-label">一级规格名 <span class="required">*</span></label><input type="text" class="form-input" id="varName1" value="Color" maxlength="14" placeholder="如：Color"></div>
    <div class="form-group"><label class="form-label">规格图模式</label><select class="form-input" id="variationImageMode" onchange="renderPrimaryOptions()"><option value="option1">按一级规格生成（官方推荐）</option><option value="none">不生成规格图</option></select></div>
  </div>
  <div class="form-hint">Shopee 的 Image per Variation 映射一级规格值；同一颜色的不同尺码共用一张规格图。</div>
  <div class="spec-toolbar"><h4>一级规格值</h4><button type="button" class="btn btn-outline btn-compact" onclick="addPrimaryOption()">添加规格值</button></div>
  <div id="primaryOptionsContainer"></div>
  <label class="spec-switch"><input type="checkbox" id="enableTier2" onchange="toggleTier2()"> 启用二级规格</label>
  <div id="tier2Panel" style="display:none">
    <div class="form-row">
      <div class="form-group"><label class="form-label">二级规格名 <span class="required">*</span></label><input type="text" class="form-input" id="varName2" maxlength="14" placeholder="如：Size"></div>
      <div class="form-group"><label class="form-label">二级规格值 <span class="required">*</span></label><textarea class="form-textarea" id="tier2Values" rows="2" placeholder="如：S, M, L（逗号或换行分隔）" oninput="renderCombinations()"></textarea></div>
    </div>
  </div>
  <div class="spec-toolbar"><h4>SKU 组合</h4><span class="combo-summary" id="combinationSummary"></span></div>
  <div id="variantsContainer"></div>
  <hr style="margin:20px 0">
  <h4 style="margin-bottom:16px;color:var(--gray-700)">物流渠道</h4>
  <div class="form-row" id="shippingChannels"></div>
  <div style="display:flex;gap:12px;margin-top:24px">
    <button type="submit" class="btn btn-primary" id="submitBtn">创建任务</button>
    <a href="/" class="btn btn-outline">取消</a>
  </div>
</form>
</div></div></div>
<script src="/js/api.js"></script>
<script>
var refFiles=[];
var primaryOptionCounter=1;
var primaryOptions=[{id:'primary-1',value:'',file:null,preview:''}];
var combinationState={};
var channels=[{id:'5000',label:'Hỏa Tốc'},{id:'5001',label:'Nhanh'},{id:'5004',label:'Hàng Cồng Kềnh'},{id:'5012',label:'Trong Ngày'},{id:'5115',label:'Hỏa Tốc - Ưu Tiên'},{id:'50039',label:'Tủ nhận hàng - Viettel Smartbox'},{id:'50052',label:'Tủ nhận hàng - SPX'}];

document.addEventListener('DOMContentLoaded',async()=>{if(!await requireAuth())return;if(!canCreatePlatform('shopee')){showToast('当前账号无权创建虾皮任务','error');setTimeout(function(){location.href='/'},800);return}refreshNavCredits();initRefSlots();renderPrimaryOptions();initShipping()});
function canCreatePlatform(platform){var role=localStorage.getItem('ews_role')||'';var access=localStorage.getItem('ews_platform_access')||'allow';return role==='admin'||access==='allow'||access===platform}
function initShipping(){var h='';for(var c of channels)h+='<label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" class="shipping-chk" value="'+c.id+'"> '+c.label+'</label>';document.getElementById('shippingChannels').innerHTML=h;}
function initRefSlots(){
  var labels=['核心','辅助1','辅助2','辅助3','辅助4'];var html='';
  for(var i=0;i<5;i++){
    html+='<div class="ref-slot">';
    html+='<div class="ref-zone upload-zone" id="refZone'+i+'" onclick="document.getElementById(\'refInput'+i+'\').click()">';
    html+='<input type="file" id="refInput'+i+'" accept="image/*" style="display:none" onchange="handleRefUpload(event,'+i+')">';
    html+='<div id="refPlaceholder'+i+'" class="ref-placeholder"><div class="upload-text">'+(i===0?'点击上传\n核心参考图\n(必填)':'点击上传\n辅助参考图\n(可选)')+'</div></div>';
    html+='<div id="refPreview'+i+'" class="ref-preview"><img id="refPreviewImg'+i+'" src=""></div>';
    html+='</div><div class="ref-label">'+labels[i]+'</div></div>';
  }
  document.getElementById('refRow').innerHTML=html;
}
function handleRefUpload(e,i){var f=e.target.files[0];if(!f)return;refFiles[i]=f;
  var reader=new FileReader();reader.onload=function(e2){
    document.getElementById('refPlaceholder'+i).style.display='none';
    document.getElementById('refPreview'+i).style.display='block';
    document.getElementById('refPreviewImg'+i).src=e2.target.result;
    document.getElementById('refZone'+i).classList.add('has-image');
  };reader.readAsDataURL(f);
}
function precisionOptions(selected){
  selected=parseInt(selected);if(isNaN(selected))selected=0;
  var opts=[[2,'2位小数'],[1,'1位小数'],[0,'整数'],[-1,'十位归零'],[-2,'百位归零']];
  return opts.map(function(o){return '<option value="'+o[0]+'"'+(selected===o[0]?' selected':'')+'>'+o[1]+'</option>'}).join('');
}
function togglePriceFloat(cb){
  var item=cb.closest('.v-item');
  var on=cb.checked;
  item.querySelector('.price-single').style.display=on?'none':'';
  item.querySelector('.price-range').style.display=on?'':'none';
  var price=item.querySelector('.v-pr');
  var min=item.querySelector('.v-price-min');
  var max=item.querySelector('.v-price-max');
  if(price)price.required=!on;
  if(min)min.required=on;
  if(max)max.required=on;
  if(on&&price&&price.value){if(!min.value)min.value=price.value;if(!max.value)max.value=price.value}
}
function readPriceConfig(item,index,requiredPrice){
  var enabled=item.querySelector('.v-price-float')?.checked||false;
  var precision=parseInt(item.querySelector('.v-price-precision')?.value);
  if(isNaN(precision))precision=0;
  if(enabled){
    var min=parseFloat(item.querySelector('.v-price-min')?.value);
    var max=parseFloat(item.querySelector('.v-price-max')?.value);
    if(isNaN(min)||isNaN(max)||max<min){showToast('请检查变体 #'+(index+1)+' 的价格浮动区间','error');return null}
    return {price:min,price_float_enabled:1,price_min:min,price_max:max,price_precision:precision};
  }
  var raw=item.querySelector('.v-pr')?.value||'';
  if(requiredPrice&&!raw){showToast('请填写变体 #'+(index+1)+' 的价格','error');return null}
  return {price:parseFloat(raw)||0,price_float_enabled:0,price_precision:precision};
}
function getPrimaryOption(id){return primaryOptions.find(function(option){return option.id===id})}
function addPrimaryOption(){captureCombinationState();primaryOptionCounter++;primaryOptions.push({id:'primary-'+primaryOptionCounter,value:'',file:null,preview:''});renderPrimaryOptions()}
function removePrimaryOption(id){if(primaryOptions.length<=1)return;captureCombinationState();primaryOptions=primaryOptions.filter(function(option){return option.id!==id});renderPrimaryOptions()}
function handlePrimaryValue(input,id){var option=getPrimaryOption(id);if(option)option.value=input.value;renderCombinations()}
function handlePrimaryUpload(event,id){var file=event.target.files[0];if(!file)return;var option=getPrimaryOption(id);if(!option)return;option.file=file;var reader=new FileReader();reader.onload=function(result){option.preview=result.target.result;renderPrimaryOptions()};reader.readAsDataURL(file)}
function renderPrimaryOptions(){
  captureCombinationState();
  var imageEnabled=document.getElementById('variationImageMode').value==='option1';
  var html='';
  primaryOptions.forEach(function(option,index){
    html+='<div class="spec-option-row"><div class="form-group"><label class="form-label">规格值 #'+(index+1)+' <span class="required">*</span></label><input class="form-input primary-value" maxlength="20" value="'+escapeHtml(option.value)+'" placeholder="如：红色" oninput="handlePrimaryValue(this,\''+option.id+'\')"></div>';
    if(imageEnabled){
      html+='<div class="form-group"><label class="form-label">SKU 参考图 <span class="required">*</span></label><div class="upload-zone spec-upload'+(option.preview?' has-image':'')+'" onclick="document.getElementById(\'primaryInput-'+option.id+'\').click()"><input type="file" id="primaryInput-'+option.id+'" accept="image/*" style="display:none" onchange="handlePrimaryUpload(event,\''+option.id+'\')">'+(option.preview?'<img src="'+option.preview+'" alt="规格参考图">':'<div class="upload-text">点击上传</div>')+'</div></div>';
    }else html+='<div class="form-group"><label class="form-label">SKU 参考图</label><div class="form-hint" style="padding:12px 0">当前模式不生成或导出规格图</div></div>';
    html+='<button type="button" class="variant-remove" onclick="removePrimaryOption(\''+option.id+'\')"'+(primaryOptions.length<=1?' disabled':'')+'>删除</button></div>';
  });
  document.getElementById('primaryOptionsContainer').innerHTML=html;
  renderCombinations();
}
function toggleTier2(){document.getElementById('tier2Panel').style.display=document.getElementById('enableTier2').checked?'':'none';renderCombinations()}
function getTier2Values(){
  if(!document.getElementById('enableTier2').checked)return [''];
  var seen={};return document.getElementById('tier2Values').value.split(/[\n,，]+/).map(function(value){return value.trim()}).filter(function(value){var key=value.toLowerCase();if(!value||seen[key])return false;seen[key]=true;return true});
}
function captureCombinationState(){
  document.querySelectorAll('.v-item').forEach(function(item){
    combinationState[item.dataset.key]={enabled:item.querySelector('.v-enabled').checked,price:item.querySelector('.v-pr').value,floatOn:item.querySelector('.v-price-float').checked,priceMin:item.querySelector('.v-price-min').value,priceMax:item.querySelector('.v-price-max').value,precision:item.querySelector('.v-price-precision').value,stock:item.querySelector('.v-st').value,sku:item.querySelector('.v-sk').value};
  });
}
function toggleCombinationEnabled(input){var item=input.closest('.v-item');item.classList.toggle('combo-disabled',!input.checked);item.querySelectorAll('input:not(.v-enabled),select').forEach(function(control){control.disabled=!input.checked});if(input.checked)togglePriceFloat(item.querySelector('.v-price-float'))}
function renderCombinations(){
  captureCombinationState();
  var tier2Values=getTier2Values();var combos=[];
  primaryOptions.forEach(function(option){tier2Values.forEach(function(option2){combos.push({option:option,option2:option2,key:JSON.stringify([option.id,option2])})})});
  document.getElementById('combinationSummary').textContent=combos.length+' / 50 个组合';
  var container=document.getElementById('variantsContainer');
  if(!tier2Values.length){container.innerHTML='<div class="combo-empty">填写二级规格值后将自动生成 SKU 组合。</div>';return}
  if(combos.length>50){container.innerHTML='<div class="combo-empty" style="color:var(--danger)">SKU 组合超过 Shopee 的 50 个上限，请减少规格值。</div>';return}
  var html='';
  combos.forEach(function(combo,index){
    var state=combinationState[combo.key]||{enabled:true,price:'',floatOn:false,priceMin:'',priceMax:'',precision:'0',stock:'0',sku:''};
    var label=(combo.option.value||'一级规格 #'+(primaryOptions.indexOf(combo.option)+1))+(combo.option2?' / '+combo.option2:'');
    html+='<div class="variant-item v-item'+(state.enabled?'':' combo-disabled')+'" data-key="'+escapeHtml(combo.key)+'" data-primary-id="'+combo.option.id+'" data-option2="'+escapeHtml(combo.option2)+'"><div class="variant-header"><span class="variant-number">'+escapeHtml(label)+'</span><label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" class="v-enabled" onchange="toggleCombinationEnabled(this)"'+(state.enabled?' checked':'')+'> 启用</label></div>';
    html+='<div class="form-row"><div class="form-group price-single" style="'+(state.floatOn?'display:none':'')+'"><label style="font-size:13px">价格 <span class="required">*</span></label><input type="number" class="form-input v-pr" step="0.01" min="1000" value="'+escapeHtml(state.price)+'"'+(state.floatOn?'':' required')+(state.enabled?'':' disabled')+'></div><div class="form-group"><label style="font-size:13px">库存</label><input type="number" class="form-input v-st" min="0" value="'+escapeHtml(state.stock||'0')+'"'+(state.enabled?'':' disabled')+'></div></div>';
    html+='<label style="display:flex;align-items:center;gap:6px;margin:8px 0 10px;font-size:13px"><input type="checkbox" class="v-price-float" onchange="togglePriceFloat(this)"'+(state.floatOn?' checked':'')+(state.enabled?'':' disabled')+'> 启用价格浮动</label>';
    html+='<div class="form-row price-range" style="'+(state.floatOn?'':'display:none')+'"><div class="form-group"><label style="font-size:13px">最低价 <span class="required">*</span></label><input type="number" class="form-input v-price-min" step="0.01" min="1000" value="'+escapeHtml(state.priceMin)+'"'+(state.floatOn?' required':'')+(state.enabled?'':' disabled')+'></div><div class="form-group"><label style="font-size:13px">最高价 <span class="required">*</span></label><input type="number" class="form-input v-price-max" step="0.01" min="1000" value="'+escapeHtml(state.priceMax)+'"'+(state.floatOn?' required':'')+(state.enabled?'':' disabled')+'></div><div class="form-group"><label style="font-size:13px">取价精度</label><select class="form-input v-price-precision"'+(state.enabled?'':' disabled')+'>'+precisionOptions(state.precision)+'</select></div></div>';
    html+='<div class="form-group"><label style="font-size:13px">SKU</label><input class="form-input v-sk" maxlength="99" placeholder="商家SKU" value="'+escapeHtml(state.sku)+'"'+(state.enabled?'':' disabled')+'></div></div>';
  });
  container.innerHTML=html;
}
async function uploadFile(taskId,file,folder){
  var fd=new FormData();fd.append('file',file);fd.append('folder',folder);fd.append('task_id',taskId);
  var token=localStorage.getItem('ews_token');
  var res=await fetch(API_BASE+'/api/upload',{method:'POST',headers:token?{'Authorization':'Bearer '+token}:{},body:fd});
  return await res.json();
}
async function handleCreate(e){
  e.preventDefault();
  var name=document.getElementById('productName').value.trim();
  var referenceTitle=document.getElementById('referenceTitle').value.trim();
  if(!name){showToast('请填写商品名称','error');return}
  if(!referenceTitle){showToast('请填写参考标题','error');return}
  if(!refFiles[0]){showToast('请上传核心参考图','error');return}
  var variationName1=document.getElementById('varName1').value.trim();
  if(!variationName1){showToast('请填写一级规格名','error');return}
  var optionNames=primaryOptions.map(function(option){return option.value.trim()});var optionNameKeys={};
  for(var oi=0;oi<optionNames.length;oi++){var optionKey=optionNames[oi].toLowerCase();if(!optionNames[oi]){showToast('请填写所有一级规格值','error');return}if(optionNameKeys[optionKey]){showToast('一级规格值不能重复','error');return}optionNameKeys[optionKey]=true}
  var tier2Enabled=document.getElementById('enableTier2').checked;var tier2Values=getTier2Values();
  if(tier2Enabled&&!document.getElementById('varName2').value.trim()){showToast('请填写二级规格名','error');return}
  if(tier2Enabled&&!tier2Values.length){showToast('请填写二级规格值','error');return}
  var varItems=Array.from(document.querySelectorAll('.v-item')).filter(function(item){return item.querySelector('.v-enabled').checked});
  if(!varItems.length){showToast('至少启用一个 SKU 组合','error');return}
  if(varItems.length>50){showToast('SKU 组合不能超过 50 个','error');return}
  var imageMode=document.getElementById('variationImageMode').value;var usedPrimaryIds={};
  varItems.forEach(function(item){usedPrimaryIds[item.dataset.primaryId]=true});
  if(imageMode==='option1'){for(var primary of primaryOptions){if(usedPrimaryIds[primary.id]&&!primary.file){showToast('请上传“'+primary.value+'”的 SKU 参考图','error');return}}}
  for(var pi=0;pi<varItems.length;pi++){if(!readPriceConfig(varItems[pi],pi,true))return}
  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='初始化...';
  var initRes=await API.initTask('shopee');
  if(!initRes.success){showToast(initRes.error||'初始化失败','error');btn.disabled=false;btn.textContent='创建商品';return}
  var taskId=initRes.task_id;btn.textContent='上传参考图...';
  var auxUrls=[];var refImg='';
  for(var ri=0;ri<5;ri++){var rf=refFiles[ri];if(!rf)continue;
    var upRes=await uploadFile(taskId,rf,'references');if(!upRes.success){showToast('参考图上传失败','error');btn.disabled=false;return}
    if(ri===0)refImg=upRes.url||upRes.key;else auxUrls.push(upRes.url||upRes.key);
  }
  var primaryImageUrls={};var usedPrimaryOptions=primaryOptions.filter(function(primary){return usedPrimaryIds[primary.id]});
  if(imageMode==='option1')for(var ui=0;ui<usedPrimaryOptions.length;ui++){
    btn.textContent='上传SKU参考图 '+(ui+1)+'/'+usedPrimaryOptions.length+'...';
    var sRes=await uploadFile(taskId,usedPrimaryOptions[ui].file,'variants');
    if(!sRes.success){showToast('SKU参考图上传失败','error');btn.disabled=false;btn.textContent='创建任务';return}
    primaryImageUrls[usedPrimaryOptions[ui].id]=sRes.url||sRes.key;
  }
  var variations=[];
  for(var i=0;i<varItems.length;i++){
    var primaryOption=getPrimaryOption(varItems[i].dataset.primaryId);
    var pricing=readPriceConfig(varItems[i],i,true);
    if(!pricing){btn.disabled=false;btn.textContent='创建商品';return}
    variations.push({
      option1:primaryOption.value.trim(),
      option2:tier2Enabled?varItems[i].dataset.option2:'',
      image_per_variation:primaryImageUrls[primaryOption.id]||'',
      price:pricing.price,
      price_float_enabled:pricing.price_float_enabled,
      price_min:pricing.price_min,
      price_max:pricing.price_max,
      price_precision:pricing.price_precision,
      stock:parseInt(varItems[i].querySelector('.v-st').value)||0,
      sku:varItems[i].querySelector('.v-sk').value.trim(),
    });
  }
  btn.textContent='提交...';
  var submitRes=await API.updateTask(taskId,{
    name,description:document.getElementById('productDesc').value.trim(),reference_title:referenceTitle,
    main_description:document.getElementById('mainDescription').value.trim(),
    detail_description:document.getElementById('detailDescription').value.trim(),
    reference_image:refImg,auxiliary_images:JSON.stringify(auxUrls),
    cover_image:refImg,images:JSON.stringify(auxUrls),
    main_image_count:parseInt(document.getElementById('mainImageCount').value),
    detail_image_count:parseInt(document.getElementById('detailImageCount').value),
    generate_count:parseInt(document.getElementById('generateCount').value),
    mode:document.querySelector('input[name="genMode"]:checked').value,
    weight_kg:parseFloat(document.getElementById('weightKg').value)||0,
    category_id:document.getElementById('categoryId').value.trim(),
    brand_id:document.getElementById('brandId').value.trim(),
    length_cm:parseFloat(document.getElementById('length').value)||null,
    width_cm:parseFloat(document.getElementById('width').value)||null,
    height_cm:parseFloat(document.getElementById('height').value)||null,
    gtin:document.getElementById('gtin').value.trim(),
    hs_code:document.getElementById('hsCode').value.trim(),
    variation_name1:variationName1,
    variation_name2:tier2Enabled?document.getElementById('varName2').value.trim():'',
    variation_image_mode:imageMode,
    shipping_channels:JSON.stringify(Array.from(document.querySelectorAll('.shipping-chk:checked')).map(function(cb){return cb.value})),
    variations:variations,
  });
  if(submitRes.success){showToast('商品创建成功！','success');setTimeout(()=>{window.location.href='/'},1500)}
  else{showToast(submitRes.error||'提交失败','error');btn.disabled=false;btn.textContent='创建商品'}
}
function escapeHtml(s){if(s===undefined||s===null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
</script>
</body></html>
