<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>任务列表 - EWS</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.task-workspace{border:1px solid var(--gray-200);border-radius:8px;background:#fff;overflow:hidden}.task-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px;border-bottom:1px solid var(--gray-200)}.task-filter{display:flex;gap:3px;padding:3px;border:1px solid var(--gray-200);border-radius:7px;background:var(--gray-50)}.task-filter button{min-height:30px;padding:5px 10px;border:0;border-radius:5px;background:transparent;color:var(--gray-500);cursor:pointer;font-size:12px;font-weight:650}.task-filter button.active{background:#fff;color:var(--gray-900);box-shadow:0 1px 2px rgba(16,24,40,.08)}.task-toolbar-meta{display:flex;align-items:center;gap:14px}.page-size-control{display:flex;align-items:center;gap:6px;color:var(--gray-500);font-size:11px;white-space:nowrap}.page-size-control select{height:30px;padding:0 26px 0 9px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;color:var(--gray-700);font:inherit;cursor:pointer}.page-size-control select:disabled{cursor:wait;opacity:.6}.task-overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border-bottom:1px solid var(--gray-200)}.task-metric{padding:15px 18px;border-right:1px solid var(--gray-200)}.task-metric:last-child{border-right:0}.task-metric span{display:block;color:var(--gray-500);font-size:11px}.task-metric strong{display:block;margin-top:3px;color:var(--gray-900);font-size:20px;font-weight:750;font-variant-numeric:tabular-nums}.task-content table{min-width:920px}.task-name{color:var(--gray-900);font-weight:650}.platform-tag{margin-right:0}.tag-jst{background:#edf5ff;color:#205fa8}.tag-shopee{background:#fff5e8;color:#9a5805}.task-actions{display:flex;gap:5px;flex-wrap:wrap}.muted{color:var(--gray-500);font-size:11px}.btn-warning{background:#b66a08;color:#fff}.btn-warning-outline{background:#fff;border-color:#e4bf8a;color:#9a5805}
.btn.action-loading{cursor:wait;pointer-events:none;opacity:.72}.btn.action-loading::after{content:"";width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;display:inline-block;animation:actionSpin .7s linear infinite}.confirm-message{color:var(--gray-700);font-size:14px;line-height:1.7}.confirm-subtle{color:var(--gray-500);font-size:12px;margin-top:10px}.confirm-modal .modal-footer .btn{min-width:76px;justify-content:center}@keyframes actionSpin{to{transform:rotate(360deg)}}
.task-detail-modal{width:min(100%,980px);max-width:980px}.detail-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding-bottom:18px;border-bottom:1px solid var(--gray-200);margin-bottom:18px}.detail-hero h3{margin-top:7px;color:var(--gray-900);font-size:18px}.detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;border:1px solid var(--gray-200);border-radius:8px;background:var(--gray-200);overflow:hidden;margin-bottom:20px}.detail-grid .detail-section{min-height:76px;margin:0;padding:13px;background:#fff}.plan-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}.plan-actions{display:flex;gap:5px;white-space:nowrap}.plan-table td:nth-child(5){min-width:220px;white-space:normal;word-break:break-word}
.detail-loading-body{display:grid;min-height:320px;place-items:center}.detail-loading-state{display:flex;align-items:center;flex-direction:column;gap:10px;color:var(--gray-500);font-size:13px;text-align:center}.detail-loading-state .spinner{margin:0 0 4px}.detail-loading-state strong{color:var(--gray-800);font-size:15px}
.image-preview-overlay{z-index:650;padding:24px;background:rgba(16,24,40,.76)}.image-preview-modal{display:grid;width:min(760px,calc(100vw - 48px));height:min(82dvh,760px);max-height:none;grid-template-rows:auto minmax(0,1fr);overflow:hidden}.image-preview-stage{position:relative;display:grid;min-height:280px;padding:24px;place-items:center;overflow:hidden;background:var(--gray-100);cursor:zoom-out}.image-preview-stage img{position:absolute;inset:24px;display:block;width:auto;height:auto;max-width:min(calc(100% - 48px),640px);max-height:calc(100% - 48px);margin:auto;object-fit:contain;opacity:0;transition:opacity var(--transition);cursor:default}.image-preview-stage img.is-loaded{opacity:1}.image-preview-state{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gray-600);font-size:13px}.image-preview-error{display:none;max-width:420px;color:var(--danger);text-align:center}.image-preview-stage.has-error .image-preview-loading{display:none}.image-preview-stage.has-error .image-preview-error{display:block}
@media(max-width:760px){.task-toolbar{align-items:flex-start;flex-direction:column}.task-toolbar-meta{width:100%;justify-content:space-between}.task-overview{grid-template-columns:repeat(2,1fr)}.task-metric:nth-child(2){border-right:0}.task-metric:nth-child(-n+2){border-bottom:1px solid var(--gray-200)}.detail-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.image-preview-overlay{align-items:center;padding:10px}.image-preview-modal{width:100%;height:82dvh;border-radius:8px}.image-preview-stage{padding:12px}.image-preview-stage img{inset:12px;max-width:calc(100% - 24px);max-height:calc(100% - 24px)}}
</style>
</head><body>
<script src="/js/nav.js"></script>
<div class="app-container">
<div class="page-header"><div class="page-heading"><div class="page-kicker">任务中心</div><h1 class="page-title">商品生产任务</h1><p class="page-subtitle">查看双平台任务状态，处理失败计划并导出已完成的商品资源。</p></div>
<div class="action-bar" id="taskCreateActions">
<button class="btn btn-outline" onclick="window.refreshTasks&&window.refreshTasks(this)">刷新</button></div></div>
<section class="task-workspace">
  <div class="task-toolbar"><div class="task-filter" id="taskFilter"><button type="button" class="active" onclick="setTaskFilter('',this)">全部</button><button type="button" onclick="setTaskFilter('jst',this)">聚水潭</button><button type="button" onclick="setTaskFilter('shopee',this)">Shopee</button></div><div class="task-toolbar-meta"><span class="muted" id="taskRange">正在读取任务</span><label class="page-size-control" for="taskPageSize">每页<select id="taskPageSize" onchange="setTaskPageSize(this.value,this)"><option value="10">10 条</option><option value="20">20 条</option></select></label></div></div>
  <div class="task-overview" id="taskOverview"><div class="task-metric"><span>任务总数</span><strong>-</strong></div><div class="task-metric"><span>处理中</span><strong>-</strong></div><div class="task-metric"><span>已完成</span><strong>-</strong></div><div class="task-metric"><span>需要处理</span><strong>-</strong></div></div>
  <div class="task-content" id="taskContent"></div>
</section>
</div>

<div class="modal-overlay" id="opOverlay" style="z-index:400">
  <div class="modal" style="max-width:380px;text-align:center">
    <div class="modal-body" style="padding:40px 32px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:var(--gray-800)" id="opTitle">操作中...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="downloadOverlay" style="z-index:400">
  <div class="modal" style="max-width:400px;text-align:center">
    <div class="modal-body" style="padding:40px 32px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:var(--gray-800);margin-bottom:8px" id="downloadTitle">正在打包图片...</div>
      <div style="font-size:13px;color:var(--gray-500)" id="downloadProgress">准备中</div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
var ACTION_TIMEOUT_MS=120000;
var activeActionLocks={};
var detailRequestSequence=0;
var zipLibPromise=null;
var taskPage=1;
var savedTaskPageSize=parseInt(localStorage.getItem('ews_task_page_size'));
var taskPageSize=savedTaskPageSize===20?20:10;
var taskPlatformFilter='';
document.addEventListener('DOMContentLoaded',async()=>{syncTaskPageSizeControl();if(!await requireAuth())return;refreshNavCredits();renderCreateActions();await refreshTasks()});

function userPlatformAccess(){return localStorage.getItem('ews_platform_access')||'allow'}
function userCanCreate(platform){return localStorage.getItem('ews_role')==='admin'||userPlatformAccess()==='allow'||userPlatformAccess()===platform}
function createTaskButtonsHtml(){
  var html='';
  if(userCanCreate('jst')) html+='<a href="/create-jst.html" class="btn btn-primary">创建(聚水潭)</a>';
  if(userCanCreate('shopee')) html+='<a href="/create-shopee.html" class="btn btn-primary">创建(虾皮)</a>';
  return html;
}
function renderCreateActions(){
  var el=document.getElementById('taskCreateActions');
  if(!el)return;
  el.innerHTML=createTaskButtonsHtml()+'<button class="btn btn-outline" onclick="window.refreshTasks&&window.refreshTasks(this)">刷新</button>';
}
function taskSkeleton(){
  return '<div aria-label="任务加载中">'+Array.from({length:6},function(){return '<div class="skeleton-row">'+Array.from({length:6},function(){return '<span class="skeleton skeleton-line"></span>'}).join('')+'</div>'}).join('')+'</div>';
}
function renderTaskOverview(tasks,total){
  var processing=tasks.filter(function(task){return task.status==='processing'||task.status==='pending'}).length;
  var completed=tasks.filter(function(task){return task.status==='completed'}).length;
  var attention=tasks.filter(function(task){return task.status==='failed'||task.status==='partial_failed'}).length;
  document.getElementById('taskOverview').innerHTML='<div class="task-metric"><span>任务总数</span><strong>'+total+'</strong></div><div class="task-metric"><span>待处理与处理中</span><strong>'+processing+'</strong></div><div class="task-metric"><span>本页已完成</span><strong>'+completed+'</strong></div><div class="task-metric"><span>本页需要处理</span><strong>'+attention+'</strong></div>';
}
function setTaskFilter(platform,button){
  taskPlatformFilter=platform;taskPage=1;
  document.querySelectorAll('#taskFilter button').forEach(function(item){item.classList.toggle('active',item===button)});
  refreshTasks();
}
function syncTaskPageSizeControl(){var select=document.getElementById('taskPageSize');if(select)select.value=String(taskPageSize)}
async function setTaskPageSize(value,select){
  var next=parseInt(value);
  if(next!==10&&next!==20){syncTaskPageSizeControl();return}
  taskPageSize=next;taskPage=1;localStorage.setItem('ews_task_page_size',String(next));
  if(select){select.value=String(next);select.disabled=true}
  try{await refreshTasks()}finally{if(select)select.disabled=false}
}

async function refreshTasks(btn){
  if(btn) setActionButtonLoading(btn,'刷新中...');
  try{
    const c=document.getElementById('taskContent');c.innerHTML=taskSkeleton();
    const res=await API.getTasks(taskPlatformFilter,taskPage,taskPageSize);
    if(!res.success){c.innerHTML='<div class="empty-state"><div class="empty-text">加载失败: '+(res.error||'')+'</div></div>';return}
    const tasks=res.tasks||[];
    renderTaskOverview(tasks,res.total||0);
    document.getElementById('taskRange').textContent=tasks.length?'本页 '+tasks.length+' 个，共 '+(res.total||tasks.length)+' 个任务':'当前筛选暂无任务';
    if(tasks.length===0){c.innerHTML='<div class="empty-state"><div class="empty-text">暂无任务</div><div style="margin-top:16px">'+(createTaskButtonsHtml()||'<span class="muted">当前账号暂无可创建的平台</span>')+'</div></div>';return}
    var html='<div class="table-container"><table><thead><tr><th>平台</th><th>任务ID</th><th>任务名称</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
    for(var i=0;i<tasks.length;i++){
      var t=tasks[i];
      var platTag=t.platform==='jst'?'<span class="platform-tag tag-jst">聚水潭</span>':'<span class="platform-tag tag-shopee">虾皮</span>';
      html+='<tr><td>'+platTag+'</td><td><code class="muted">'+escapeHtml((t.id||'').slice(0,8))+'</code></td><td><span class="task-name">'+escapeHtml(t.name||'(未命名)')+'</span></td><td>'+statusBadge(t.status)+'</td><td>'+formatDate(t.created_at)+'</td><td><div class="task-actions">';
      html+='<button class="btn btn-sm btn-outline" onclick="viewTask(\''+t.id+'\',this)">详情</button>';
      html+='<button class="btn btn-sm btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">打包图片</button>';
      var hasPlans=(parseInt(t.plan_count)||0)>0;
      if(t.status==='pending'&&!hasPlans) html+='<button class="btn btn-sm btn-success" onclick="pushTask(\''+t.id+'\',false,this)">推送</button>';
      if(t.status==='pending'&&!hasPlans&&localStorage.getItem('ews_role')==='admin') html+='<button class="btn btn-sm btn-warning-outline" onclick="pushTask(\''+t.id+'\',true,this)">测试</button>';
      if(t.status==='failed'||t.status==='partial_failed') html+='<button class="btn btn-sm btn-warning" onclick="retryFailedPlans(\''+t.id+'\',this)">继续</button>';
      html+='<button class="btn btn-sm btn-danger" onclick="deleteTask(\''+t.id+'\',this)">删除</button>';
      html+='</div></td></tr>';
    }
    html+='</tbody></table></div>';
    if((res.pages||1)>1){
      html+='<div class="modal-footer" style="justify-content:space-between"><span class="muted">第 '+res.page+' / '+res.pages+' 页，共 '+res.total+' 个任务</span><div class="task-actions"><button class="btn btn-sm btn-outline" '+(res.page<=1?'disabled':'')+' onclick="changeTaskPage(-1)">上一页</button><button class="btn btn-sm btn-outline" '+(res.page>=res.pages?'disabled':'')+' onclick="changeTaskPage(1)">下一页</button></div></div>';
    }
    c.innerHTML=html;
  }finally{
    if(btn) restoreActionButton(btn);
  }
}

async function changeTaskPage(offset){
  taskPage=Math.max(1,taskPage+offset);
  await refreshTasks();
}

async function viewTask(taskId,btn,label){
  var lockKey='view-detail:'+taskId;
  if(activeActionLocks[lockKey]){showToast('任务详情正在加载，请等待服务器响应','info');return false}
  var requestId=++detailRequestSequence;
  return await withActionLock(lockKey,btn,label||'加载中...',async function(){
    showDetailLoading();
    var responses=await Promise.all([
      API.getTask(taskId),
      API.getPushPlans(taskId).catch(function(e){return {success:false,error:(e&&e.message)||'推送计划加载失败'}})
    ]);
    if(requestId!==detailRequestSequence)return false;
    var res=responses[0];
    if(!res.success||!res.task){removeDetailModal();showToast(res.error||'加载失败','error');return false}
    removeDetailModal();
    var t=res.task;
    if(t.platform==='jst') await showJstDetail(t,responses[1]);
    else await showShopeeDetail(t,responses[1]);
    return true;
  },{onError:function(){
    if(requestId===detailRequestSequence){detailRequestSequence++;removeDetailModal()}
  }});
}

async function showJstDetail(t,plansResponse){
  var dt=document.createElement('div');dt.className='modal-overlay show';dt.id='detailModal';
  var done=(t.sub_tasks||[]).filter(function(s){return s.status==='completed'}).length;
  var typeLabel=t.product_type==='single'?'无规格':t.product_type==='two'?'二维规格':'一维规格';
  var html='<div class="modal task-detail-modal"><div class="modal-header"><div class="modal-title">任务详情</div><button class="modal-close" onclick="closeDetail()">&times;</button></div><div class="modal-body">';
  html+='<div class="detail-hero"><div><span class="platform-tag tag-jst">聚水潭</span><h3>'+escapeHtml(t.name||'')+'</h3></div>'+statusBadge(t.status)+'</div><div class="detail-grid">';
  html+='<div class="detail-section"><div class="detail-label">任务 ID</div><div class="detail-value"><code>'+escapeHtml(t.id||'')+'</code></div></div>';
  html+='<div class="detail-section"><div class="detail-label">生成模式</div><div class="detail-value">'+escapeHtml(t.mode||'full')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">子任务进度</div><div class="detail-value">'+done+' / '+(t.sub_tasks||[]).length+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">图片配置</div><div class="detail-value">'+(t.main_image_count||5)+' 主图，'+(t.detail_image_count||5)+' 详情图</div></div></div>';
  html+='<div class="detail-grid"><div class="detail-section"><div class="detail-label">商品结构</div><div class="detail-value">'+typeLabel+'</div></div><div class="detail-section"><div class="detail-label">模板行数</div><div class="detail-value">'+((t.generate_count||1)*(t.variants||[]).length)+'</div></div><div class="detail-section"><div class="detail-label">供应商</div><div class="detail-value">'+escapeHtml(t.supplier_name||'未填写')+'</div></div><div class="detail-section"><div class="detail-label">SKU 图片模式</div><div class="detail-value">'+(t.variation_image_mode==='none'?'不生成':'按一级规格生成')+'</div></div></div>';
  html+=await renderPushPlans(t.id,plansResponse);
  if(t.variants) html+='<div class="detail-section"><div class="detail-label">SKU 组合 ('+t.variants.length+'个)</div><div class="detail-value">'+t.variants.map(function(v){return escapeHtml((v.tier1_value||v.name||'默认商品')+(v.tier2_value?' / '+v.tier2_value:''))}).join(', ')+'</div></div>';
  html+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">打包图片</button><button class="btn btn-primary" onclick="doExport(\''+t.id+'\')">导出聚水潭</button><button class="btn btn-outline" onclick="closeDetail()">关闭</button></div></div>';
  dt.innerHTML=html;document.body.appendChild(dt);
}

async function showShopeeDetail(t,plansResponse){
  var dt=document.createElement('div');dt.className='modal-overlay show';dt.id='detailModal';
  var p=t.product||{};
  var done=(p.sub_tasks||[]).filter(function(s){return s.status==='completed'}).length;
  var v=(p.variations||[]).map(function(v){return escapeHtml(v.option1+(v.option2?'/'+v.option2:''))}).join(', ');
  var html='<div class="modal task-detail-modal"><div class="modal-header"><div class="modal-title">商品详情</div><button class="modal-close" onclick="closeDetail()">&times;</button></div><div class="modal-body">';
  html+='<div class="detail-hero"><div><span class="platform-tag tag-shopee">Shopee</span><h3>'+escapeHtml(p.name||'')+'</h3></div>'+statusBadge(t.status)+'</div><div class="detail-grid">';
  html+='<div class="detail-section"><div class="detail-label">任务 ID</div><div class="detail-value"><code>'+escapeHtml(t.id||'')+'</code></div></div>';
  html+='<div class="detail-section"><div class="detail-label">生成模式</div><div class="detail-value">'+escapeHtml(p.mode||'full')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">子任务进度</div><div class="detail-value">'+done+' / '+(p.sub_tasks||[]).length+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">商品图片</div><div class="detail-value">'+(p.main_image_count||9)+' 张</div></div>';
  html+='<div class="detail-section"><div class="detail-label">分类 ID</div><div class="detail-value">'+escapeHtml(p.category_id||'未填写')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">规格结构</div><div class="detail-value">'+escapeHtml((p.variation_name1||'无规格')+(p.variation_name2?'/'+p.variation_name2:''))+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">规格值</div><div class="detail-value">'+(v||'无')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">重量</div><div class="detail-value">'+(p.weight_kg||'')+' kg</div></div></div>';
  html+=await renderPushPlans(t.id,plansResponse);
  html+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">打包图片</button><button class="btn btn-primary" onclick="doExport(\''+t.id+'\')">导出Shopee</button><button class="btn btn-outline" onclick="closeDetail()">关闭</button></div></div>';
  dt.innerHTML=html;document.body.appendChild(dt);
}

function removeDetailModal(){var el=document.getElementById('detailModal');if(el){el.remove();}}
function showDetailLoading(){
  removeDetailModal();
  var overlay=document.createElement('div');
  overlay.className='modal-overlay show';
  overlay.id='detailModal';
  overlay.innerHTML='<div class="modal task-detail-modal" role="dialog" aria-modal="true" aria-busy="true" aria-labelledby="detailLoadingTitle"><div class="modal-header"><div class="modal-title" id="detailLoadingTitle">任务详情</div><button class="modal-close" type="button" onclick="closeDetail()">&times;</button></div><div class="modal-body detail-loading-body"><div class="detail-loading-state"><div class="spinner"></div><strong>正在加载任务详情</strong><span>正在读取任务数据与推送计划</span></div></div></div>';
  document.body.appendChild(overlay);
}
function closeDetail(){detailRequestSequence++;removeDetailModal()}

var imagePreviewTrigger=null;
function openImagePreview(button){
  var url=button&&button.dataset?button.dataset.previewUrl:'';
  if(!url){showToast('图片地址无效','error');return}
  closeImagePreview(false);
  imagePreviewTrigger=button;
  var title=(button.dataset.previewTitle||'图片预览').trim();
  var overlay=document.createElement('div');
  overlay.className='modal-overlay image-preview-overlay show';
  overlay.id='imagePreviewModal';
  overlay.innerHTML='<div class="modal image-preview-modal" role="dialog" aria-modal="true" aria-labelledby="imagePreviewTitle">'+
    '<div class="modal-header"><div class="modal-title" id="imagePreviewTitle">'+escapeHtml(title)+'</div><button class="modal-close" type="button" data-preview-close aria-label="关闭图片预览">&times;</button></div>'+
    '<div class="image-preview-stage" data-preview-stage><div class="image-preview-state image-preview-loading"><span class="spinner" aria-hidden="true"></span><span>正在加载图片...</span></div><div class="image-preview-error" role="alert">图片加载失败，请稍后重试。</div></div></div>';
  var onKey=function(event){if(event.key==='Escape')closeImagePreview()};
  overlay._previewKeyHandler=onKey;
  overlay.addEventListener('click',function(event){
    if(event.target===overlay||event.target.hasAttribute('data-preview-close')||event.target.hasAttribute('data-preview-stage'))closeImagePreview();
  });
  document.addEventListener('keydown',onKey);
  document.body.appendChild(overlay);
  var closeButton=overlay.querySelector('[data-preview-close]');
  if(closeButton)closeButton.focus();
  var stage=overlay.querySelector('[data-preview-stage]');
  var image=new Image();
  image.alt=title;
  image.decoding='async';
  image.addEventListener('load',function(){
    var loading=stage.querySelector('.image-preview-loading');
    if(loading)loading.remove();
    image.classList.add('is-loaded');
  });
  image.addEventListener('error',function(){image.remove();stage.classList.add('has-error')});
  stage.appendChild(image);
  image.src=url;
}

function closeImagePreview(restoreFocus){
  var overlay=document.getElementById('imagePreviewModal');
  if(overlay){
    if(overlay._previewKeyHandler)document.removeEventListener('keydown',overlay._previewKeyHandler);
    var image=overlay.querySelector('img');
    if(image)image.removeAttribute('src');
    overlay.remove();
  }
  if(restoreFocus!==false&&imagePreviewTrigger&&document.contains(imagePreviewTrigger))imagePreviewTrigger.focus();
  imagePreviewTrigger=null;
}

function setActionButtonLoading(btn,label){
  if(!btn)return;
  if(!btn.dataset.actionOriginalHtml)btn.dataset.actionOriginalHtml=btn.innerHTML;
  btn.dataset.actionWasDisabled=btn.disabled?'1':'0';
  btn.disabled=true;
  btn.classList.add('action-loading');
  btn.setAttribute('aria-busy','true');
  if(label)btn.innerHTML=escapeHtml(label);
}

function restoreActionButton(btn){
  if(!btn)return;
  if(btn.dataset.actionOriginalHtml){btn.innerHTML=btn.dataset.actionOriginalHtml;delete btn.dataset.actionOriginalHtml;}
  btn.disabled=btn.dataset.actionWasDisabled==='1';
  delete btn.dataset.actionWasDisabled;
  btn.classList.remove('action-loading');
  btn.removeAttribute('aria-busy');
}

function withActionTimeout(promise,ms){
  var timer=null;
  var timeout=new Promise(function(_,reject){
    timer=setTimeout(function(){
      var err=new Error('服务器超过120秒未响应，已解除按钮锁定，请稍后重试');
      err.code='ACTION_TIMEOUT';
      reject(err);
    },ms);
  });
  return Promise.race([promise,timeout]).finally(function(){if(timer)clearTimeout(timer)});
}

function hideBusyOverlays(){
  ['opOverlay','downloadOverlay'].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.classList.remove('show');
  });
}

async function withActionLock(key,btn,label,fn,options){
  if(activeActionLocks[key]){showToast('该操作正在处理中，请等待服务器响应','info');return}
  activeActionLocks[key]=true;
  setActionButtonLoading(btn,label||'处理中...');
  try{return await withActionTimeout(Promise.resolve().then(fn),ACTION_TIMEOUT_MS)}
  catch(e){
    if(options&&typeof options.onError==='function'){try{options.onError(e)}catch(_){}}
    if(e&&e.code==='ACTION_TIMEOUT'){hideBusyOverlays();showToast(e.message,'error');return}
    showToast((e&&e.message)||'操作失败','error');
  }finally{
    delete activeActionLocks[key];
    restoreActionButton(btn);
  }
}

function showConfirmDialog(opts){
  if(document.getElementById('confirmModal')){showToast('请先处理当前确认弹窗','info');return Promise.resolve(false)}
  opts=opts||{};
  return new Promise(function(resolve){
    var modal=document.createElement('div');
    modal.className='modal-overlay show';
    modal.id='confirmModal';
    modal.style.zIndex='500';
    modal.innerHTML='<div class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" style="max-width:420px">'+
      '<div class="modal-header"><div class="modal-title" id="confirmTitle">'+escapeHtml(opts.title||'确认操作')+'</div><button class="modal-close" type="button" data-confirm-cancel>&times;</button></div>'+
      '<div class="modal-body"><div class="confirm-message">'+escapeHtml(opts.message||'确定继续该操作吗？')+'</div>'+(opts.hint?'<div class="confirm-subtle">'+escapeHtml(opts.hint)+'</div>':'')+'</div>'+
      '<div class="modal-footer"><button class="btn btn-outline" type="button" data-confirm-cancel>取消</button><button class="btn '+(opts.danger?'btn-danger':'btn-primary')+'" type="button" data-confirm-ok>'+escapeHtml(opts.confirmText||'确认')+'</button></div>'+
      '</div>';
    function finish(value){
      document.removeEventListener('keydown',onKey);
      modal.remove();
      resolve(value);
    }
    function onKey(e){if(e.key==='Escape')finish(false)}
    modal.addEventListener('click',function(e){
      if(e.target===modal||e.target.hasAttribute('data-confirm-cancel'))finish(false);
      if(e.target.hasAttribute('data-confirm-ok'))finish(true);
    });
    document.addEventListener('keydown',onKey);
    document.body.appendChild(modal);
    setTimeout(function(){
      var target=opts.danger?modal.querySelector('.modal-footer [data-confirm-cancel]'):modal.querySelector('[data-confirm-ok]');
      if(target)target.focus();
    },0);
  });
}

async function pushTask(taskId,testMode,btn){
  testMode=!!testMode;
  var ok=await showConfirmDialog({
    title:testMode?'测试推送':'推送任务',
    message:testMode?'测试模式只创建子任务并构造工作流请求，不触发实际工作流。确定继续？':'确定要推送该任务到工作流吗？',
    confirmText:testMode?'开始测试':'开始推送'
  });
  if(!ok)return;
  await withActionLock((testMode?'test:':'push:')+taskId,btn,testMode?'测试中...':'推送中...',async function(){
    await runWithOverlay(testMode?'正在测试任务...':'正在推送任务...', async function(){
      var res=await API.pushTask(taskId,testMode);
      if(!res.success){showToast(res.error||'推送失败','error');return}
      if(testMode) showToast('测试完成：已构造 '+(res.jobs_count??res.total_plans??0)+' 个工作流请求','info');
      else showToast(res.message||'已创建推送计划','success');
      await refreshTasks();
    });
  });
}

async function retryPlan(taskId,planId,btn,mode){
  var isPush=mode==='push';
  var isRegen=mode==='regen';
  var ok=await showConfirmDialog({
    title:isPush?'推送计划':(isRegen?'重新生成':'重试计划'),
    message:isPush?'确定要推送这个队列计划吗？':(isRegen?'确定要重新生成这个已完成的队列计划吗？生成成功后会覆盖原资源。':'确定要重试这个推送计划吗？'),
    confirmText:isPush?'推送':(isRegen?'重新生成':'重试')
  });
  if(!ok)return;
  await withActionLock('retry-plan:'+planId,btn,isPush?'推送中...':(isRegen?'重新生成中...':'重试中...'),async function(){
    await runWithOverlay(isPush?'正在推送队列计划...':(isRegen?'正在重新生成队列资源...':'正在重试推送计划...'), async function(){
      var res=await API.retryPlan(taskId,planId);
      if(!res.success){showToast(res.error||(isPush?'推送失败':(isRegen?'重新生成失败':'重试失败')),'error');return}
      showToast(isPush?'计划已推送':(isRegen?'计划已重新发送':'计划已重试'),'success');
      await refreshTasks();
      await viewTask(taskId);
    });
  });
}

async function retryFailedPlans(taskId,btn){
  var ok=await showConfirmDialog({title:'继续失败计划',message:'确定要继续推送所有失败的推送计划吗？',confirmText:'继续'});
  if(!ok)return;
  await withActionLock('retry-failed:'+taskId,btn,'继续中...',async function(){
    await runWithOverlay('正在重试失败计划...', async function(){
      var plansRes=await API.getPushPlans(taskId);
      if(!plansRes.success){showToast('获取推送计划失败','error');return}
      var failed=(plansRes.plans||[]).filter(function(p){return p.status==='failed'});
      if(!failed.length){showToast('没有失败的推送计划','info');return}
      var ok=0;
      for(var i=0;i<failed.length;i++){
        var res=await API.retryPlan(taskId,failed[i].id);
        if(res.success)ok++;
      }
      showToast('已重试 '+ok+'/'+failed.length+' 个失败计划','success');
      await refreshTasks();
      if(document.getElementById('detailModal'))await viewTask(taskId);
    });
  });
}

async function refreshTaskDetail(taskId,btn){
  return viewTask(taskId,btn,'刷新中...');
}

async function deleteTask(taskId,btn){
  var ok=await showConfirmDialog({title:'删除任务',message:'确定要删除该任务及其R2图片吗？',hint:'删除后无法在系统内恢复。',confirmText:'删除',danger:true});
  if(!ok)return;
  await withActionLock('delete:'+taskId,btn,'删除中...',async function(){
    await runWithOverlay('正在删除任务...', async function(){
      var res=await API.deleteTask(taskId);
      if(!res.success){showToast(res.error||'删除失败','error');return}
      showToast('任务已删除','success');
      closeDetail();
      await refreshTasks();
    });
  });
}

async function downloadTaskImages(taskId,btn){
  await withActionLock('download:'+taskId,btn,'打包中...',function(){return downloadTaskImagesInner(taskId)});
}

function ensureZipLib(){
  if(window.JSZip)return Promise.resolve(window.JSZip);
  if(zipLibPromise)return zipLibPromise;
  zipLibPromise=new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.async=true;
    s.onload=function(){window.JSZip?resolve(window.JSZip):(zipLibPromise=null,reject(new Error('JSZip not available')))};
    s.onerror=function(){zipLibPromise=null;reject(new Error('JSZip load failed'))};
    document.head.appendChild(s);
  });
  return zipLibPromise;
}

async function downloadTaskImagesInner(taskId){
  try{await ensureZipLib()}catch(e){showToast('打包组件加载失败，请刷新后重试','error');return}
  var overlay=document.getElementById('downloadOverlay');
  var titleEl=document.getElementById('downloadTitle');
  var progEl=document.getElementById('downloadProgress');
  var res=await API.getTask(taskId);
  if(!res.success||!res.task){showToast('获取任务详情失败','error');return}
  var task=res.task;
  var images=getGeneratedImages(task);
  if(!images.length){showToast('该任务暂无已生成图片','info');return}
  titleEl.textContent='正在下载图片...';
  progEl.textContent='0 / '+images.length;
  overlay.classList.add('show');
  var zip=new JSZip();
  var total=images.length;
  var fetched=0;
  for(var i=0;i<total;i++){
    var img=images[i];
    try{
      var resp=await fetch(img.image_url);
      if(resp.ok){
        var blob=await resp.blob();
        zip.folder(img.sub_task_id||'unassigned').file(imageFileName(img),blob);
        fetched++;
      }
    }catch(e){console.warn('下载失败:',img.image_url,e)}
    progEl.textContent=fetched+' / '+total;
    titleEl.textContent='正在下载图片... ('+(i+1)+'/'+total+')';
  }
  if(!fetched){overlay.classList.remove('show');showToast('所有图片下载失败','error');return}
  titleEl.textContent='正在生成压缩包...';
  progEl.textContent='请稍候';
  try{
    var content=await zip.generateAsync({type:'blob'});
    var link=document.createElement('a');
    link.href=URL.createObjectURL(content);
    link.download=zipFileName(taskId);
    document.body.appendChild(link);
    link.click();
    var href=link.href;
    link.remove();
    setTimeout(function(){URL.revokeObjectURL(href)},1000);
    overlay.classList.remove('show');
    showToast('打包完成: '+fetched+'/'+total+' 张图片','success');
  }catch(e){
    overlay.classList.remove('show');
    showToast('生成ZIP失败: '+e.message,'error');
  }
}

function getGeneratedImages(task){
  var images=task.platform==='shopee' ? ((task.product||{}).images_rec||[]) : (task.images||[]);
  return images.filter(function(img){return img.image_url&&img.sub_task_id});
}

function imageFileName(img){
  var pos=img.position||1;
  var variant=img.variant_id?('_'+img.variant_id):'';
  return (img.image_type||'image')+'_'+pos+variant+'.jpg';
}

function zipFileName(taskId){
  var now=new Date();
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,'0');
  var d=String(now.getDate()).padStart(2,'0');
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ss=String(now.getSeconds()).padStart(2,'0');
  return y+'-'+m+'-'+d+'-'+taskId+'-'+hh+mm+ss+'.zip';
}

async function runWithOverlay(title,fn){
  var overlay=document.getElementById('opOverlay');
  document.getElementById('opTitle').textContent=title||'操作中...';
  overlay.classList.add('show');
  try{return await fn()}catch(e){showToast(e.message||'操作失败','error')}finally{overlay.classList.remove('show')}
}

async function doExport(taskId){
  if(!window.XLSX){showToast('导出组件加载中，请稍后再试','error');return}
  var res=await API.exportTask(taskId);
  if(!res.success||!res.rows||!res.rows.length){
    var msg=res.error||'无数据';
    if(res.errors&&res.errors.length){
      msg+=': '+res.errors.slice(0,2).join('；');
      if(res.errors.length>2)msg+=' 等'+res.errors.length+'项';
    }
    showToast(msg,'error');return
  }
  try{
    if(res.export_format==='shopee'){await exportShopeeTemplate(res,taskId);showToast('导出成功！','success');return}
    if(res.export_format==='jst'){await exportJstTemplate(res,taskId);showToast('导出成功！','success');return}
    var keys=res.columns||Object.keys(res.rows[0]);var wsData=[keys];
    for(var r of res.rows) wsData.push(Array.isArray(r)?r:keys.map(function(k){return r[k]}));
    var ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=keys.map(function(){return{wch:20}});
    var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'导出');
    var fmt=res.export_format==='shopee'?'Shopee':'聚水潭';
    XLSX.writeFile(wb,fmt+'_'+(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('导出成功！','success');
  }catch(err){showToast('导出失败: '+err.message,'error')}
}

async function exportJstTemplate(res,taskId){
  var tpl=await fetch('/templates/聚水潭_商品模板.xlsx');
  if(!tpl.ok)throw new Error('找不到聚水潭商品模板文件');
  var wb=XLSX.read(await tpl.arrayBuffer(),{type:'array'});
  var sheetName=res.template_sheet||'商品导入模板';
  var ws=wb.Sheets[sheetName]||wb.Sheets[wb.SheetNames[0]];
  var startRow=Math.max(Number(res.template_start_row)||3,1);
  XLSX.utils.sheet_add_aoa(ws,res.rows,{origin:'A'+startRow});
  var range=XLSX.utils.decode_range(ws['!ref']||'A1:V3');
  range.e.r=Math.max(range.e.r,startRow-1+res.rows.length-1);
  range.e.c=Math.max(range.e.c,21);
  ws['!ref']=XLSX.utils.encode_range(range);
  XLSX.writeFile(wb,'聚水潭_'+safeFileName(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

async function exportShopeeTemplate(res,taskId){
  var tpl=await fetch('/templates/Shopee_mass_upload_2026-07-03_basic_template.xlsx');
  if(!tpl.ok)throw new Error('找不到Shopee官方模板文件');
  var wb=XLSX.read(await tpl.arrayBuffer(),{type:'array'});
  var ws=wb.Sheets['Template']||wb.Sheets[wb.SheetNames[0]];
  XLSX.utils.sheet_add_aoa(ws,res.rows,{origin:'A7'});
  var range=XLSX.utils.decode_range(ws['!ref']||'A1:AP6');
  range.e.r=Math.max(range.e.r,5+res.rows.length);
  range.e.c=Math.max(range.e.c,(res.rows[0]||[]).length-1);
  ws['!ref']=XLSX.utils.encode_range(range);
  XLSX.writeFile(wb,'Shopee_'+safeFileName(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

async function renderPushPlans(taskId,preloadedResponse){
  var res=preloadedResponse;
  if(res===undefined){try{res=await API.getPushPlans(taskId)}catch(e){res=null}}
  var plans=(res&&res.success)?(res.plans||[]):[];
  var stats=(res&&res.success&&res.stats)?res.stats:{pending:0,processing:0,done:0,failed:0,total:0};
  var html='<div class="detail-section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">';
  html+='<div class="detail-label">推送计划 <span class="muted">共 '+(stats.total||plans.length)+' 项';
  if(stats.done) html+='，成功 '+stats.done;
  if(stats.failed) html+='，失败 '+stats.failed;
  if(stats.pending) html+='，待推送 '+stats.pending;
  if(stats.processing) html+='，处理中 '+stats.processing;
  html+='</span></div>';
  html+='<div class="plan-toolbar">';
  if(stats.failed)html+='<button class="btn btn-sm btn-danger" onclick="retryFailedPlans(\''+taskId+'\',this)">重试全部失败 ('+stats.failed+')</button>';
  html+='<button class="btn btn-sm btn-outline" onclick="refreshTaskDetail(\''+taskId+'\',this)">刷新队列</button></div></div>';
  if(!res||!res.success){return html+'<div class="muted">推送计划加载失败</div></div>'}
  if(!plans.length){return html+'<div class="muted">暂无推送计划，任务推送后会在这里显示队列状态。</div></div>'}
  html+='<div class="table-container"><table class="plan-table" style="font-size:13px"><thead><tr><th>类型</th><th>状态</th><th>操作</th><th>子任务</th><th>错误</th></tr></thead><tbody>';
  for(var i=0;i<plans.length;i++){
    var p=plans[i];
    var actions=[];
    if(p.status==='failed') actions.push('<button class="btn btn-sm btn-outline" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'retry\')">重试</button>');
    else if(p.status==='pending') actions.push('<button class="btn btn-sm btn-primary" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'push\')">推送</button>');
    else if(p.status==='done') actions.push('<button class="btn btn-sm btn-outline" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'regen\')">重新生成</button>');
    if(p.status==='done'&&p.preview_url) actions.push('<button type="button" class="btn btn-sm btn-outline" data-preview-url="'+escapeHtml(p.preview_url)+'" data-preview-title="'+escapeHtml(planTypeLabel(p.webhook_type)+' 图片预览')+'" onclick="openImagePreview(this)">预览</button>');
    var action=actions.length?'<div class="plan-actions">'+actions.join('')+'</div>':'<span class="muted">-</span>';
    html+='<tr><td>'+escapeHtml(planTypeLabel(p.webhook_type))+'</td><td>'+planStatusBadge(p.status)+'</td><td>'+action+'</td><td><code class="muted">'+escapeHtml((p.sub_task_id||'').slice(0,8)||'-')+'</code></td><td>'+escapeHtml((p.error||'').slice(0,160))+'</td></tr>';
  }
  html+='</tbody></table></div></div>';
  return html;
}

function planTypeLabel(type){
  type=type||'';
  if(type==='title')return '商品标题';
  if(type==='sku_title')return 'SKU标题';
  if(type==='main_1'||type==='main')return '封面图';
  if(type.indexOf('sub_')===0)return '附图 '+type.split('_')[1];
  if(type.indexOf('detail_')===0)return '详情图 '+type.split('_')[1];
  if(type.indexOf('sku_')===0)return 'SKU图 '+type.split('_')[1];
  return type||'-';
}

function planStatusBadge(status){
  var map={pending:['待推送','badge-warning'],processing:['处理中','badge-info'],done:['已完成','badge-success'],failed:['失败','badge-danger']};
  var s=map[status]||[status||'', 'badge-default'];
  return '<span class="badge '+s[1]+'">'+escapeHtml(s[0])+'</span>';
}

function statusBadge(status){
  if(status==='partial_failed')return '<span class="badge badge-warning">部分失败</span>';
  var map={init:['初始化','badge-default'],pending:['待推送','badge-warning'],processing:['处理中','badge-info'],completed:['已完成','badge-success'],failed:['失败','badge-danger']};
  var s=map[status]||[status||'', 'badge-default'];
  return '<span class="badge '+s[1]+'">'+escapeHtml(s[0])+'</span>';
}
function formatDate(s){
  if(!s)return '';
  var text=String(s).trim();
  var hasZone=/([zZ]|[+-]\d{2}:?\d{2})$/.test(text);
  var iso=text.replace(' ','T')+(hasZone?'':'Z');
  var d=new Date(iso);
  if(isNaN(d.getTime()))return text.slice(0,16);
  var parts=new Intl.DateTimeFormat('zh-CN',{
    timeZone:'Asia/Shanghai',
    year:'numeric',month:'2-digit',day:'2-digit',
    hour:'2-digit',minute:'2-digit',
    hour12:false
  }).formatToParts(d).reduce(function(acc,p){acc[p.type]=p.value;return acc},{});
  return parts.year+'-'+parts.month+'-'+parts.day+' '+parts.hour+':'+parts.minute;
}
function safeFileName(s){return String(s||'').replace(/[\\/:*?"<>|]/g,'_').slice(0,60)||'export'}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
Object.assign(window,{refreshTasks,changeTaskPage,setTaskPageSize,viewTask,refreshTaskDetail,closeDetail,openImagePreview,closeImagePreview,pushTask,retryPlan,retryFailedPlans,deleteTask,downloadTaskImages,doExport});
