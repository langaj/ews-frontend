<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>д»»еҠЎеҲ—иЎЁ - EWS</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.task-workspace{border:1px solid var(--gray-200);border-radius:8px;background:#fff;overflow:hidden}.task-toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px;border-bottom:1px solid var(--gray-200)}.task-filter{display:flex;gap:3px;padding:3px;border:1px solid var(--gray-200);border-radius:7px;background:var(--gray-50)}.task-filter button{min-height:30px;padding:5px 10px;border:0;border-radius:5px;background:transparent;color:var(--gray-500);cursor:pointer;font-size:12px;font-weight:650}.task-filter button.active{background:#fff;color:var(--gray-900);box-shadow:0 1px 2px rgba(16,24,40,.08)}.task-overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border-bottom:1px solid var(--gray-200)}.task-metric{padding:15px 18px;border-right:1px solid var(--gray-200)}.task-metric:last-child{border-right:0}.task-metric span{display:block;color:var(--gray-500);font-size:11px}.task-metric strong{display:block;margin-top:3px;color:var(--gray-900);font-size:20px;font-weight:750;font-variant-numeric:tabular-nums}.task-content table{min-width:920px}.task-name{color:var(--gray-900);font-weight:650}.platform-tag{margin-right:0}.tag-jst{background:#edf5ff;color:#205fa8}.tag-shopee{background:#fff5e8;color:#9a5805}.task-actions{display:flex;gap:5px;flex-wrap:wrap}.muted{color:var(--gray-500);font-size:11px}.btn-warning{background:#b66a08;color:#fff}.btn-warning-outline{background:#fff;border-color:#e4bf8a;color:#9a5805}
.btn.action-loading{cursor:wait;pointer-events:none;opacity:.72}.btn.action-loading::after{content:"";width:12px;height:12px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;display:inline-block;animation:actionSpin .7s linear infinite}.confirm-message{color:var(--gray-700);font-size:14px;line-height:1.7}.confirm-subtle{color:var(--gray-500);font-size:12px;margin-top:10px}.confirm-modal .modal-footer .btn{min-width:76px;justify-content:center}@keyframes actionSpin{to{transform:rotate(360deg)}}
.task-detail-modal{width:min(100%,980px);max-width:980px}.detail-hero{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;padding-bottom:18px;border-bottom:1px solid var(--gray-200);margin-bottom:18px}.detail-hero h3{margin-top:7px;color:var(--gray-900);font-size:18px}.detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1px;border:1px solid var(--gray-200);border-radius:8px;background:var(--gray-200);overflow:hidden;margin-bottom:20px}.detail-grid .detail-section{min-height:76px;margin:0;padding:13px;background:#fff}.plan-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px}.plan-actions{display:flex;gap:5px;white-space:nowrap}.plan-table td:nth-child(5){min-width:220px;white-space:normal;word-break:break-word}
.detail-loading-body{display:grid;min-height:320px;place-items:center}.detail-loading-state{display:flex;align-items:center;flex-direction:column;gap:10px;color:var(--gray-500);font-size:13px;text-align:center}.detail-loading-state .spinner{margin:0 0 4px}.detail-loading-state strong{color:var(--gray-800);font-size:15px}
.image-preview-overlay{z-index:650;padding:24px;background:rgba(16,24,40,.76)}.image-preview-modal{display:grid;width:min(760px,calc(100vw - 48px));height:min(82dvh,760px);max-height:none;grid-template-rows:auto minmax(0,1fr);overflow:hidden}.image-preview-stage{position:relative;display:grid;min-height:280px;padding:24px;place-items:center;overflow:hidden;background:var(--gray-100);cursor:zoom-out}.image-preview-stage img{position:absolute;inset:24px;display:block;width:auto;height:auto;max-width:min(calc(100% - 48px),640px);max-height:calc(100% - 48px);margin:auto;object-fit:contain;opacity:0;transition:opacity var(--transition);cursor:default}.image-preview-stage img.is-loaded{opacity:1}.image-preview-state{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gray-600);font-size:13px}.image-preview-error{display:none;max-width:420px;color:var(--danger);text-align:center}.image-preview-stage.has-error .image-preview-loading{display:none}.image-preview-stage.has-error .image-preview-error{display:block}
@media(max-width:760px){.task-toolbar{align-items:flex-start;flex-direction:column}.task-overview{grid-template-columns:repeat(2,1fr)}.task-metric:nth-child(2){border-right:0}.task-metric:nth-child(-n+2){border-bottom:1px solid var(--gray-200)}.detail-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.image-preview-overlay{align-items:center;padding:10px}.image-preview-modal{width:100%;height:82dvh;border-radius:8px}.image-preview-stage{padding:12px}.image-preview-stage img{inset:12px;max-width:calc(100% - 24px);max-height:calc(100% - 24px)}}
</style>
</head><body>
<script src="/js/nav.js"></script>
<div class="app-container">
<div class="page-header"><div class="page-heading"><div class="page-kicker">д»»еҠЎдёӯеҝғ</div><h1 class="page-title">е•Ҷе“Ғз”ҹдә§д»»еҠЎ</h1><p class="page-subtitle">жҹҘзңӢеҸҢе№іеҸ°д»»еҠЎзҠ¶жҖҒпјҢеӨ„зҗҶеӨұиҙҘи®ЎеҲ’е№¶еҜјеҮәе·Іе®ҢжҲҗзҡ„е•Ҷе“Ғиө„жәҗгҖӮ</p></div>
<div class="action-bar" id="taskCreateActions">
<button class="btn btn-outline" onclick="window.refreshTasks&&window.refreshTasks(this)">еҲ·ж–°</button></div></div>
<section class="task-workspace">
  <div class="task-toolbar"><div class="task-filter" id="taskFilter"><button type="button" class="active" onclick="setTaskFilter('',this)">е…ЁйғЁ</button><button type="button" onclick="setTaskFilter('jst',this)">иҒҡж°ҙжҪӯ</button><button type="button" onclick="setTaskFilter('shopee',this)">Shopee</button></div><span class="muted" id="taskRange">жӯЈеңЁиҜ»еҸ–д»»еҠЎ</span></div>
  <div class="task-overview" id="taskOverview"><div class="task-metric"><span>д»»еҠЎжҖ»ж•°</span><strong>-</strong></div><div class="task-metric"><span>еӨ„зҗҶдёӯ</span><strong>-</strong></div><div class="task-metric"><span>е·Іе®ҢжҲҗ</span><strong>-</strong></div><div class="task-metric"><span>йңҖиҰҒеӨ„зҗҶ</span><strong>-</strong></div></div>
  <div class="task-content" id="taskContent"></div>
</section>
</div>

<div class="modal-overlay" id="opOverlay" style="z-index:400">
  <div class="modal" style="max-width:380px;text-align:center">
    <div class="modal-body" style="padding:40px 32px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:var(--gray-800)" id="opTitle">ж“ҚдҪңдёӯ...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="downloadOverlay" style="z-index:400">
  <div class="modal" style="max-width:400px;text-align:center">
    <div class="modal-body" style="padding:40px 32px">
      <div class="spinner" style="margin:0 auto 16px"></div>
      <div style="font-size:15px;font-weight:600;color:var(--gray-800);margin-bottom:8px" id="downloadTitle">жӯЈеңЁжү“еҢ…еӣҫзүҮ...</div>
      <div style="font-size:13px;color:var(--gray-500)" id="downloadProgress">еҮҶеӨҮдёӯ</div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
var ACTION_TIMEOUT_MS=120000;
var activeActionLocks={};
var detailRequestSequence=0;
var zipLibPromise=null;
var taskPage=1;
var taskPageSize=50;
var taskPlatformFilter='';
document.addEventListener('DOMContentLoaded',async()=>{if(!await requireAuth())return;refreshNavCredits();renderCreateActions();await refreshTasks()});

function userPlatformAccess(){return localStorage.getItem('ews_platform_access')||'allow'}
function userCanCreate(platform){return localStorage.getItem('ews_role')==='admin'||userPlatformAccess()==='allow'||userPlatformAccess()===platform}
function createTaskButtonsHtml(){
  var html='';
  if(userCanCreate('jst')) html+='<a href="/create-jst.html" class="btn btn-primary">еҲӣе»ә(иҒҡж°ҙжҪӯ)</a>';
  if(userCanCreate('shopee')) html+='<a href="/create-shopee.html" class="btn btn-primary">еҲӣе»ә(иҷҫзҡ®)</a>';
  return html;
}
function renderCreateActions(){
  var el=document.getElementById('taskCreateActions');
  if(!el)return;
  el.innerHTML=createTaskButtonsHtml()+'<button class="btn btn-outline" onclick="window.refreshTasks&&window.refreshTasks(this)">еҲ·ж–°</button>';
}
function taskSkeleton(){
  return '<div aria-label="д»»еҠЎеҠ иҪҪдёӯ">'+Array.from({length:6},function(){return '<div class="skeleton-row">'+Array.from({length:6},function(){return '<span class="skeleton skeleton-line"></span>'}).join('')+'</div>'}).join('')+'</div>';
}
function renderTaskOverview(tasks,total){
  var processing=tasks.filter(function(task){return task.status==='processing'||task.status==='pending'}).length;
  var completed=tasks.filter(function(task){return task.status==='completed'}).length;
  var attention=tasks.filter(function(task){return task.status==='failed'||task.status==='partial_failed'}).length;
  document.getElementById('taskOverview').innerHTML='<div class="task-metric"><span>д»»еҠЎжҖ»ж•°</span><strong>'+total+'</strong></div><div class="task-metric"><span>еҫ…еӨ„зҗҶдёҺеӨ„зҗҶдёӯ</span><strong>'+processing+'</strong></div><div class="task-metric"><span>жң¬йЎөе·Іе®ҢжҲҗ</span><strong>'+completed+'</strong></div><div class="task-metric"><span>жң¬йЎөйңҖиҰҒеӨ„зҗҶ</span><strong>'+attention+'</strong></div>';
}
function setTaskFilter(platform,button){
  taskPlatformFilter=platform;taskPage=1;
  document.querySelectorAll('#taskFilter button').forEach(function(item){item.classList.toggle('active',item===button)});
  refreshTasks();
}

async function refreshTasks(btn){
  if(btn) setActionButtonLoading(btn,'еҲ·ж–°дёӯ...');
  try{
    const c=document.getElementById('taskContent');c.innerHTML=taskSkeleton();
    const res=await API.getTasks(taskPlatformFilter,taskPage,taskPageSize);
    if(!res.success){c.innerHTML='<div class="empty-state"><div class="empty-text">еҠ иҪҪеӨұиҙҘ: '+(res.error||'')+'</div></div>';return}
    const tasks=res.tasks||[];
    renderTaskOverview(tasks,res.total||0);
    document.getElementById('taskRange').textContent=tasks.length?'жң¬йЎө '+tasks.length+' дёӘпјҢе…ұ '+(res.total||tasks.length)+' дёӘд»»еҠЎ':'еҪ“еүҚзӯӣйҖүжҡӮж— д»»еҠЎ';
    if(tasks.length===0){c.innerHTML='<div class="empty-state"><div class="empty-text">жҡӮж— д»»еҠЎ</div><div style="margin-top:16px">'+(createTaskButtonsHtml()||'<span class="muted">еҪ“еүҚиҙҰеҸ·жҡӮж— еҸҜеҲӣе»әзҡ„е№іеҸ°</span>')+'</div></div>';return}
    var html='<div class="table-container"><table><thead><tr><th>е№іеҸ°</th><th>д»»еҠЎID</th><th>д»»еҠЎеҗҚз§°</th><th>зҠ¶жҖҒ</th><th>еҲӣе»әж—¶й—ҙ</th><th>ж“ҚдҪң</th></tr></thead><tbody>';
    for(var i=0;i<tasks.length;i++){
      var t=tasks[i];
      var platTag=t.platform==='jst'?'<span class="platform-tag tag-jst">иҒҡж°ҙжҪӯ</span>':'<span class="platform-tag tag-shopee">иҷҫзҡ®</span>';
      html+='<tr><td>'+platTag+'</td><td><code class="muted">'+escapeHtml((t.id||'').slice(0,8))+'</code></td><td><span class="task-name">'+escapeHtml(t.name||'(жңӘе‘ҪеҗҚ)')+'</span></td><td>'+statusBadge(t.status)+'</td><td>'+formatDate(t.created_at)+'</td><td><div class="task-actions">';
      html+='<button class="btn btn-sm btn-outline" onclick="viewTask(\''+t.id+'\',this)">иҜҰжғ…</button>';
      html+='<button class="btn btn-sm btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">жү“еҢ…еӣҫзүҮ</button>';
      var hasPlans=(parseInt(t.plan_count)||0)>0;
      if(t.status==='pending'&&!hasPlans) html+='<button class="btn btn-sm btn-success" onclick="pushTask(\''+t.id+'\',false,this)">жҺЁйҖҒ</button>';
      if(t.status==='pending'&&!hasPlans&&localStorage.getItem('ews_role')==='admin') html+='<button class="btn btn-sm btn-warning-outline" onclick="pushTask(\''+t.id+'\',true,this)">жөӢиҜ•</button>';
      if(t.status==='failed'||t.status==='partial_failed') html+='<button class="btn btn-sm btn-warning" onclick="retryFailedPlans(\''+t.id+'\',this)">з»§з»ӯ</button>';
      html+='<button class="btn btn-sm btn-danger" onclick="deleteTask(\''+t.id+'\',this)">еҲ йҷӨ</button>';
      html+='</div></td></tr>';
    }
    html+='</tbody></table></div>';
    if((res.pages||1)>1){
      html+='<div class="modal-footer" style="justify-content:space-between"><span class="muted">з¬¬ '+res.page+' / '+res.pages+' йЎөпјҢе…ұ '+res.total+' дёӘд»»еҠЎ</span><div class="task-actions"><button class="btn btn-sm btn-outline" '+(res.page<=1?'disabled':'')+' onclick="changeTaskPage(-1)">дёҠдёҖйЎө</button><button class="btn btn-sm btn-outline" '+(res.page>=res.pages?'disabled':'')+' onclick="changeTaskPage(1)">дёӢдёҖйЎө</button></div></div>';
    }
    c.innerHTML=html;
  }finally{
    if(btn) restoreActionButton(btn);
  }
}

async function changeTaskPage(offset){
  taskPage=Math.max(1,taskPage+offset);
  await refreshTasks();
}

async function viewTask(taskId,btn,label){
  var lockKey='view-detail:'+taskId;
  if(activeActionLocks[lockKey]){showToast('д»»еҠЎиҜҰжғ…жӯЈеңЁеҠ иҪҪпјҢиҜ·зӯүеҫ…жңҚеҠЎеҷЁе“Қеә”','info');return false}
  var requestId=++detailRequestSequence;
  return await withActionLock(lockKey,btn,label||'еҠ иҪҪдёӯ...',async function(){
    showDetailLoading();
    var responses=await Promise.all([
      API.getTask(taskId),
      API.getPushPlans(taskId).catch(function(e){return {success:false,error:(e&&e.message)||'жҺЁйҖҒи®ЎеҲ’еҠ иҪҪеӨұиҙҘ'}})
    ]);
    if(requestId!==detailRequestSequence)return false;
    var res=responses[0];
    if(!res.success||!res.task){removeDetailModal();showToast(res.error||'еҠ иҪҪеӨұиҙҘ','error');return false}
    removeDetailModal();
    var t=res.task;
    if(t.platform==='jst') await showJstDetail(t,responses[1]);
    else await showShopeeDetail(t,responses[1]);
    return true;
  },{onError:function(){
    if(requestId===detailRequestSequence){detailRequestSequence++;removeDetailModal()}
  }});
}

async function showJstDetail(t,plansResponse){
  var dt=document.createElement('div');dt.className='modal-overlay show';dt.id='detailModal';
  var done=(t.sub_tasks||[]).filter(function(s){return s.status==='completed'}).length;
  var typeLabel=t.product_type==='single'?'ж— и§„ж ј':t.product_type==='two'?'дәҢз»ҙи§„ж ј':'дёҖз»ҙи§„ж ј';
  var html='<div class="modal task-detail-modal"><div class="modal-header"><div class="modal-title">д»»еҠЎиҜҰжғ…</div><button class="modal-close" onclick="closeDetail()">&times;</button></div><div class="modal-body">';
  html+='<div class="detail-hero"><div><span class="platform-tag tag-jst">иҒҡж°ҙжҪӯ</span><h3>'+escapeHtml(t.name||'')+'</h3></div>'+statusBadge(t.status)+'</div><div class="detail-grid">';
  html+='<div class="detail-section"><div class="detail-label">д»»еҠЎ ID</div><div class="detail-value"><code>'+escapeHtml(t.id||'')+'</code></div></div>';
  html+='<div class="detail-section"><div class="detail-label">з”ҹжҲҗжЁЎејҸ</div><div class="detail-value">'+escapeHtml(t.mode||'full')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">еӯҗд»»еҠЎиҝӣеәҰ</div><div class="detail-value">'+done+' / '+(t.sub_tasks||[]).length+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">еӣҫзүҮй…ҚзҪ®</div><div class="detail-value">'+(t.main_image_count||5)+' дё»еӣҫпјҢ'+(t.detail_image_count||5)+' иҜҰжғ…еӣҫ</div></div></div>';
  html+='<div class="detail-grid"><div class="detail-section"><div class="detail-label">е•Ҷе“Ғз»“жһ„</div><div class="detail-value">'+typeLabel+'</div></div><div class="detail-section"><div class="detail-label">жЁЎжқҝиЎҢж•°</div><div class="detail-value">'+((t.generate_count||1)*(t.variants||[]).length)+'</div></div><div class="detail-section"><div class="detail-label">дҫӣеә”е•Ҷ</div><div class="detail-value">'+escapeHtml(t.supplier_name||'жңӘеЎ«еҶҷ')+'</div></div><div class="detail-section"><div class="detail-label">SKU еӣҫзүҮжЁЎејҸ</div><div class="detail-value">'+(t.variation_image_mode==='none'?'дёҚз”ҹжҲҗ':'жҢүдёҖзә§и§„ж јз”ҹжҲҗ')+'</div></div></div>';
  html+=await renderPushPlans(t.id,plansResponse);
  if(t.variants) html+='<div class="detail-section"><div class="detail-label">SKU з»„еҗҲ ('+t.variants.length+'дёӘ)</div><div class="detail-value">'+t.variants.map(function(v){return escapeHtml((v.tier1_value||v.name||'й»ҳи®Өе•Ҷе“Ғ')+(v.tier2_value?' / '+v.tier2_value:''))}).join(', ')+'</div></div>';
  html+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">жү“еҢ…еӣҫзүҮ</button><button class="btn btn-primary" onclick="doExport(\''+t.id+'\')">еҜјеҮәиҒҡж°ҙжҪӯ</button><button class="btn btn-outline" onclick="closeDetail()">е…ій—ӯ</button></div></div>';
  dt.innerHTML=html;document.body.appendChild(dt);
}

async function showShopeeDetail(t,plansResponse){
  var dt=document.createElement('div');dt.className='modal-overlay show';dt.id='detailModal';
  var p=t.product||{};
  var done=(p.sub_tasks||[]).filter(function(s){return s.status==='completed'}).length;
  var v=(p.variations||[]).map(function(v){return escapeHtml(v.option1+(v.option2?'/'+v.option2:''))}).join(', ');
  var html='<div class="modal task-detail-modal"><div class="modal-header"><div class="modal-title">е•Ҷе“ҒиҜҰжғ…</div><button class="modal-close" onclick="closeDetail()">&times;</button></div><div class="modal-body">';
  html+='<div class="detail-hero"><div><span class="platform-tag tag-shopee">Shopee</span><h3>'+escapeHtml(p.name||'')+'</h3></div>'+statusBadge(t.status)+'</div><div class="detail-grid">';
  html+='<div class="detail-section"><div class="detail-label">д»»еҠЎ ID</div><div class="detail-value"><code>'+escapeHtml(t.id||'')+'</code></div></div>';
  html+='<div class="detail-section"><div class="detail-label">з”ҹжҲҗжЁЎејҸ</div><div class="detail-value">'+escapeHtml(p.mode||'full')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">еӯҗд»»еҠЎиҝӣеәҰ</div><div class="detail-value">'+done+' / '+(p.sub_tasks||[]).length+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">е•Ҷе“ҒеӣҫзүҮ</div><div class="detail-value">'+(p.main_image_count||9)+' еј </div></div>';
  html+='<div class="detail-section"><div class="detail-label">еҲҶзұ» ID</div><div class="detail-value">'+escapeHtml(p.category_id||'жңӘеЎ«еҶҷ')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">и§„ж јз»“жһ„</div><div class="detail-value">'+escapeHtml((p.variation_name1||'ж— и§„ж ј')+(p.variation_name2?'/'+p.variation_name2:''))+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">и§„ж јеҖј</div><div class="detail-value">'+(v||'ж— ')+'</div></div>';
  html+='<div class="detail-section"><div class="detail-label">йҮҚйҮҸ</div><div class="detail-value">'+(p.weight_kg||'')+' kg</div></div></div>';
  html+=await renderPushPlans(t.id,plansResponse);
  html+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="downloadTaskImages(\''+t.id+'\',this)">жү“еҢ…еӣҫзүҮ</button><button class="btn btn-primary" onclick="doExport(\''+t.id+'\')">еҜјеҮәShopee</button><button class="btn btn-outline" onclick="closeDetail()">е…ій—ӯ</button></div></div>';
  dt.innerHTML=html;document.body.appendChild(dt);
}

function removeDetailModal(){var el=document.getElementById('detailModal');if(el){el.remove();}}
function showDetailLoading(){
  removeDetailModal();
  var overlay=document.createElement('div');
  overlay.className='modal-overlay show';
  overlay.id='detailModal';

function closeImagePreview(restoreFocus){

function setActionButtonLoading(btn,label){
  if(!btn)return;
  if(!btn.dataset.actionOriginalHtml)btn.dataset.actionOriginalHtml=btn.innerHTML;
  btn.dataset.actionWasDisabled=btn.disabled?'1':'0';
  btn.disabled=true;
  btn.classList.add('action-loading');
  btn.setAttribute('aria-busy','true');
  if(label)btn.innerHTML=escapeHtml(label);
}

function restoreActionButton(btn){
  if(!btn)return;
  if(btn.dataset.actionOriginalHtml){btn.innerHTML=btn.dataset.actionOriginalHtml;delete btn.dataset.actionOriginalHtml;}
  btn.disabled=btn.dataset.actionWasDisabled==='1';
  delete btn.dataset.actionWasDisabled;
  btn.classList.remove('action-loading');
  btn.removeAttribute('aria-busy');
}

function withActionTimeout(promise,ms){
  var timer=null;
  var timeout=new Promise(function(_,reject){
    timer=setTimeout(function(){
      var err=new Error('жңҚеҠЎеҷЁи¶…иҝҮ120з§’жңӘе“Қеә”пјҢе·Іи§ЈйҷӨжҢүй’®й”Ғе®ҡпјҢиҜ·зЁҚеҗҺйҮҚиҜ•');
      err.code='ACTION_TIMEOUT';
      reject(err);
    },ms);
  });
  return Promise.race([promise,timeout]).finally(function(){if(timer)clearTimeout(timer)});
}

function hideBusyOverlays(){
  ['opOverlay','downloadOverlay'].forEach(function(id){
    var el=document.getElementById(id);

async function withActionLock(key,btn,label,fn,options){
  if(activeActionLocks[key]){showToast('иҜҘж“ҚдҪңжӯЈеңЁеӨ„зҗҶдёӯпјҢиҜ·зӯүеҫ…жңҚеҠЎеҷЁе“Қеә”','info');return}
  activeActionLocks[key]=true;
  setActionButtonLoading(btn,label||'еӨ„зҗҶдёӯ...');
  try{return await withActionTimeout(Promise.resolve().then(fn),ACTION_TIMEOUT_MS)}
  catch(e){
    if(options&&typeof options.onError==='function'){try{options.onError(e)}catch(_){}}
    if(e&&e.code==='ACTION_TIMEOUT'){hideBusyOverlays();showToast(e.message,'error');return}
    showToast((e&&e.message)||'ж“ҚдҪңеӨұиҙҘ','error');
  }finally{
    delete activeActionLocks[key];
    restoreActionButton(btn);
  }
}

function showConfirmDialog(opts){

      '<div class="modal-body"><div class="confirm-message">'+escapeHtml(opts.message||'зЎ®е®ҡз»§з»ӯиҜҘж“ҚдҪңеҗ—пјҹ')+'</div>'+(opts.hint?'<div class="confirm-subtle">'+escapeHtml(opts.hint)+'</div>':'')+'</div>'+

      modal.remove();

function ensureZipLib(){
  if(window.JSZip)return Promise.resolve(window.JSZip);
  if(zipLibPromise)return zipLibPromise;
  zipLibPromise=new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='https://cdn.bootcdn.net/ajax/libs/jszip/3.10.1/jszip.min.js';
    s.async=true;
    s.onload=function(){window.JSZip?resolve(window.JSZip):(zipLibPromise=null,reject(new Error('JSZip not available')))};
    s.onerror=function(){zipLibPromise=null;reject(new Error('JSZip load failed'))};
    document.head.appendChild(s);
  });
  return zipLibPromise;
}

async function downloadTaskImagesInner(taskId){
  try{await ensureZipLib()}catch(e){showToast('жү“еҢ…з»„д»¶еҠ иҪҪеӨұиҙҘпјҢиҜ·еҲ·ж–°еҗҺйҮҚиҜ•','error');return}
  var overlay=document.getElementById('downloadOverlay');
  var titleEl=document.getElementById('downloadTitle');
  var progEl=document.getElementById('downloadProgress');
  var res=await API.getTask(taskId);
  if(!res.success||!res.task){showToast('иҺ·еҸ–д»»еҠЎиҜҰжғ…еӨұиҙҘ','error');return}
  var task=res.task;
  var images=getGeneratedImages(task);
  if(!images.length){showToast('иҜҘд»»еҠЎжҡӮж— е·Із”ҹжҲҗеӣҫзүҮ','info');return}
  titleEl.textContent='жӯЈеңЁдёӢиҪҪеӣҫзүҮ...';
  progEl.textContent='0 / '+images.length;
  overlay.classList.add('show');
  var zip=new JSZip();
  var total=images.length;
  var fetched=0;
  for(var i=0;i<total;i++){
    var img=images[i];
    try{
      var resp=await fetch(img.image_url);
      if(resp.ok){
        var blob=await resp.blob();
        zip.folder(img.sub_task_id||'unassigned').file(imageFileName(img),blob);
        fetched++;
      }
    }catch(e){console.warn('дёӢиҪҪеӨұиҙҘ:',img.image_url,e)}
    progEl.textContent=fetched+' / '+total;
    titleEl.textContent='жӯЈеңЁдёӢиҪҪеӣҫзүҮ... ('+(i+1)+'/'+total+')';
  }
  if(!fetched){overlay.classList.remove('show');showToast('жүҖжңүеӣҫзүҮдёӢиҪҪеӨұиҙҘ','error');return}
  titleEl.textContent='жӯЈеңЁз”ҹжҲҗеҺӢзј©еҢ…...';
  progEl.textContent='иҜ·зЁҚеҖҷ';
  try{
    var content=await zip.generateAsync({type:'blob'});
    var link=document.createElement('a');
    link.href=URL.createObjectURL(content);
    link.download=zipFileName(taskId);
    document.body.appendChild(link);
    link.click();
    var href=link.href;
    link.remove();
    setTimeout(function(){URL.revokeObjectURL(href)},1000);
    overlay.classList.remove('show');
    showToast('жү“еҢ…е®ҢжҲҗ: '+fetched+'/'+total+' еј еӣҫзүҮ','success');
  }catch(e){
    overlay.classList.remove('show');
    showToast('з”ҹжҲҗZIPеӨұиҙҘ: '+e.message,'error');
  }
}

function getGeneratedImages(task){
  var images=task.platform==='shopee' ? ((task.product||{}).images_rec||[]) : (task.images||[]);
  return images.filter(function(img){return img.image_url&&img.sub_task_id});
}

function imageFileName(img){
  var pos=img.position||1;
  var variant=img.variant_id?('_'+img.variant_id):'';
  return (img.image_type||'image')+'_'+pos+variant+'.jpg';
}

function zipFileName(taskId){
  var now=new Date();
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,'0');
  var d=String(now.getDate()).padStart(2,'0');
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ss=String(now.getSeconds()).padStart(2,'0');
  return y+'-'+m+'-'+d+'-'+taskId+'-'+hh+mm+ss+'.zip';
}

async function doExport(taskId){
  if(!window.XLSX){showToast('еҜјеҮәз»„д»¶еҠ иҪҪдёӯпјҢиҜ·зЁҚеҗҺеҶҚиҜ•','error');return}
  var res=await API.exportTask(taskId);
  if(!res.success||!res.rows||!res.rows.length){
    var msg=res.error||'ж— ж•°жҚ®';
    if(res.errors&&res.errors.length){
      msg+=': '+res.errors.slice(0,2).join('пјӣ');
      if(res.errors.length>2)msg+=' зӯү'+res.errors.length+'йЎ№';
    }
    showToast(msg,'error');return
  }
  try{
    if(res.export_format==='shopee'){await exportShopeeTemplate(res,taskId);showToast('еҜјеҮәжҲҗеҠҹпјҒ','success');return}
    if(res.export_format==='jst'){await exportJstTemplate(res,taskId);showToast('еҜјеҮәжҲҗеҠҹпјҒ','success');return}
    var keys=res.columns||Object.keys(res.rows[0]);var wsData=[keys];
    for(var r of res.rows) wsData.push(Array.isArray(r)?r:keys.map(function(k){return r[k]}));
    var ws=XLSX.utils.aoa_to_sheet(wsData);
    ws['!cols']=keys.map(function(){return{wch:20}});
    var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'еҜјеҮә');
    var fmt=res.export_format==='shopee'?'Shopee':'иҒҡж°ҙжҪӯ';
    XLSX.writeFile(wb,fmt+'_'+(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('еҜјеҮәжҲҗеҠҹпјҒ','success');
  }catch(err){showToast('еҜјеҮәеӨұиҙҘ: '+err.message,'error')}
}

async function exportJstTemplate(res,taskId){
  var tpl=await fetch('/templates/иҒҡж°ҙжҪӯ_е•Ҷе“ҒжЁЎжқҝ.xlsx');
  if(!tpl.ok)throw new Error('жүҫдёҚеҲ°иҒҡж°ҙжҪӯе•Ҷе“ҒжЁЎжқҝж–Үд»¶');
  var wb=XLSX.read(await tpl.arrayBuffer(),{type:'array'});
  var sheetName=res.template_sheet||'е•Ҷе“ҒеҜје…ҘжЁЎжқҝ';
  var ws=wb.Sheets[sheetName]||wb.Sheets[wb.SheetNames[0]];
  var startRow=Math.max(Number(res.template_start_row)||3,1);
  XLSX.utils.sheet_add_aoa(ws,res.rows,{origin:'A'+startRow});
  var range=XLSX.utils.decode_range(ws['!ref']||'A1:V3');
  range.e.r=Math.max(range.e.r,startRow-1+res.rows.length-1);
  range.e.c=Math.max(range.e.c,21);
  ws['!ref']=XLSX.utils.encode_range(range);
  XLSX.writeFile(wb,'иҒҡж°ҙжҪӯ_'+safeFileName(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

async function exportShopeeTemplate(res,taskId){
  var tpl=await fetch('/templates/Shopee_mass_upload_2026-07-03_basic_template.xlsx');
  if(!tpl.ok)throw new Error('жүҫдёҚеҲ°Shopeeе®ҳж–№жЁЎжқҝж–Үд»¶');
  var wb=XLSX.read(await tpl.arrayBuffer(),{type:'array'});
  var ws=wb.Sheets['Template']||wb.Sheets[wb.SheetNames[0]];
  XLSX.utils.sheet_add_aoa(ws,res.rows,{origin:'A7'});
  var range=XLSX.utils.decode_range(ws['!ref']||'A1:AP6');
  range.e.r=Math.max(range.e.r,5+res.rows.length);
  range.e.c=Math.max(range.e.c,(res.rows[0]||[]).length-1);
  ws['!ref']=XLSX.utils.encode_range(range);
  XLSX.writeFile(wb,'Shopee_'+safeFileName(res.task_title||taskId.slice(0,8))+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

async function renderPushPlans(taskId,preloadedResponse){
  var res=preloadedResponse;
  if(res===undefined){try{res=await API.getPushPlans(taskId)}catch(e){res=null}}
  var plans=(res&&res.success)?(res.plans||[]):[];
  var stats=(res&&res.success&&res.stats)?res.stats:{pending:0,processing:0,done:0,failed:0,total:0};
  var html='<div class="detail-section"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">';
  html+='<div class="detail-label">жҺЁйҖҒи®ЎеҲ’ <span class="muted">е…ұ '+(stats.total||plans.length)+' йЎ№';
  if(stats.done) html+='пјҢжҲҗеҠҹ '+stats.done;
  if(stats.failed) html+='пјҢеӨұиҙҘ '+stats.failed;
  if(stats.pending) html+='пјҢеҫ…жҺЁйҖҒ '+stats.pending;
  if(stats.processing) html+='пјҢеӨ„зҗҶдёӯ '+stats.processing;
  html+='</span></div>';
  html+='<div class="plan-toolbar">';
  if(stats.failed)html+='<button class="btn btn-sm btn-danger" onclick="retryFailedPlans(\''+taskId+'\',this)">йҮҚиҜ•е…ЁйғЁеӨұиҙҘ ('+stats.failed+')</button>';
  html+='<button class="btn btn-sm btn-outline" onclick="refreshTaskDetail(\''+taskId+'\',this)">еҲ·ж–°йҳҹеҲ—</button></div></div>';
  if(!res||!res.success){return html+'<div class="muted">жҺЁйҖҒи®ЎеҲ’еҠ иҪҪеӨұиҙҘ</div></div>'}
  if(!plans.length){return html+'<div class="muted">жҡӮж— жҺЁйҖҒи®ЎеҲ’пјҢд»»еҠЎжҺЁйҖҒеҗҺдјҡеңЁиҝҷйҮҢжҳҫзӨәйҳҹеҲ—зҠ¶жҖҒгҖӮ</div></div>'}
  html+='<div class="table-container"><table class="plan-table" style="font-size:13px"><thead><tr><th>зұ»еһӢ</th><th>зҠ¶жҖҒ</th><th>ж“ҚдҪң</th><th>еӯҗд»»еҠЎ</th><th>й”ҷиҜҜ</th></tr></thead><tbody>';
  for(var i=0;i<plans.length;i++){
    var p=plans[i];
    var actions=[];
    if(p.status==='failed') actions.push('<button class="btn btn-sm btn-outline" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'retry\')">йҮҚиҜ•</button>');
    else if(p.status==='pending') actions.push('<button class="btn btn-sm btn-primary" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'push\')">жҺЁйҖҒ</button>');
    else if(p.status==='done') actions.push('<button class="btn btn-sm btn-outline" onclick="retryPlan(\''+taskId+'\',\''+p.id+'\',this,\'regen\')">йҮҚж–°з”ҹжҲҗ</button>');
    if(p.status==='done'&&p.preview_url) actions.push('<button type="button" class="btn btn-sm btn-outline" data-preview-url="'+escapeHtml(p.preview_url)+'" data-preview-title="'+escapeHtml(planTypeLabel(p.webhook_type)+' еӣҫзүҮйў„и§Ҳ')+'" onclick="openImagePreview(this)">йў„и§Ҳ</button>');
    var action=actions.length?'<div class="plan-actions">'+actions.join('')+'</div>':'<span class="muted">-</span>';
    html+='<tr><td>'+escapeHtml(planTypeLabel(p.webhook_type))+'</td><td>'+planStatusBadge(p.status)+'</td><td>'+action+'</td><td><code class="muted">'+escapeHtml((p.sub_task_id||'').slice(0,8)||'-')+'</code></td><td>'+escapeHtml((p.error||'').slice(0,160))+'</td></tr>';
  }
  html+='</tbody></table></div></div>';
  return html;
}

function planTypeLabel(type){
  type=type||'';
  if(type==='title')return 'е•Ҷе“Ғж Үйўҳ';
  if(type==='sku_title')return 'SKUж Үйўҳ';
  if(type==='main_1'||type==='main')return 'е°Ғйқўеӣҫ';
  if(type.indexOf('sub_')===0)return 'йҷ„еӣҫ '+type.split('_')[1];
  if(type.indexOf('detail_')===0)return 'иҜҰжғ…еӣҫ '+type.split('_')[1];
  if(type.indexOf('sku_')===0)return 'SKUеӣҫ '+type.split('_')[1];
  return type||'-';
}

function planStatusBadge(status){
  var map={pending:['еҫ…жҺЁйҖҒ','badge-warning'],processing:['еӨ„зҗҶдёӯ','badge-info'],done:['е·Іе®ҢжҲҗ','badge-success'],failed:['еӨұиҙҘ','badge-danger']};
  var s=map[status]||[status||'', 'badge-default'];
  return '<span class="badge '+s[1]+'">'+escapeHtml(s[0])+'</span>';
}

function statusBadge(status){
  if(status==='partial_failed')return '<span class="badge badge-warning">йғЁеҲҶеӨұиҙҘ</span>';
  var map={init:['еҲқе§ӢеҢ–','badge-default'],pending:['еҫ…жҺЁйҖҒ','badge-warning'],processing:['еӨ„зҗҶдёӯ','badge-info'],completed:['е·Іе®ҢжҲҗ','badge-success'],failed:['еӨұиҙҘ','badge-danger']};
  var s=map[status]||[status||'', 'badge-default'];
  return '<span class="badge '+s[1]+'">'+escapeHtml(s[0])+'</span>';
}
function formatDate(s){
  if(!s)return '';
  var text=String(s).trim();
  var hasZone=/([zZ]|[+-]\d{2}:?\d{2})$/.test(text);
  var iso=text.replace(' ','T')+(hasZone?'':'Z');
  var d=new Date(iso);
  if(isNaN(d.getTime()))return text.slice(0,16);
  var parts=new Intl.DateTimeFormat('zh-CN',{
    timeZone:'Asia/Shanghai',
    year:'numeric',month:'2-digit',day:'2-digit',
    hour:'2-digit',minute:'2-digit',
    hour12:false
  }).formatToParts(d).reduce(function(acc,p){acc[p.type]=p.value;return acc},{});
  return parts.year+'-'+parts.month+'-'+parts.day+' '+parts.hour+':'+parts.minute;
}
function safeFileName(s){return String(s||'').replace(/[\\/:*?"<>|]/g,'_').slice(0,60)||'export'}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
