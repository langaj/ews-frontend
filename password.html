<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>账号安全 - EWS</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .security-page{max-width:960px}.security-layout{display:grid;grid-template-columns:250px minmax(0,1fr);border:1px solid var(--gray-200);border-radius:8px;background:#fff;overflow:hidden}.security-context{padding:26px;border-right:1px solid var(--gray-200);background:var(--gray-50)}.security-context h2{margin:0 0 8px;color:var(--gray-900);font-size:16px}.security-context p{margin:0;color:var(--gray-500);font-size:12px;line-height:1.65}.account-identity{margin-top:24px;padding-top:18px;border-top:1px solid var(--gray-200)}.account-identity span{display:block;color:var(--gray-500);font-size:10px;text-transform:uppercase}.account-identity strong{display:block;margin-top:5px;overflow-wrap:anywhere;color:var(--gray-900);font-size:13px}.security-form{padding:28px}.security-form form{max-width:520px}.security-form .form-group{margin-bottom:18px}.password-rule{margin:2px 0 20px;padding:10px 12px;border-left:3px solid var(--primary);background:var(--primary-light);color:var(--gray-600);font-size:11px;line-height:1.6}.show-passwords{display:flex;align-items:center;gap:8px;margin-bottom:22px;color:var(--gray-600);font-size:12px;cursor:pointer}.security-actions{display:flex;align-items:center;gap:10px}.security-message{font-size:12px}.security-message.error{color:var(--danger)}.security-message.success{color:var(--success)}
    @media(max-width:720px){.security-layout{grid-template-columns:1fr}.security-context{border-right:0;border-bottom:1px solid var(--gray-200)}.security-form{padding:22px}}
    @media(max-width:480px){.security-page{padding-inline:16px}.security-layout{margin-inline:-16px;border-left:0;border-right:0;border-radius:0}.security-context,.security-form{padding:20px}.security-actions{align-items:stretch;flex-direction:column}.security-actions .btn{width:100%}}
  </style>
</head>
<body>
  <script src="/js/nav.js"></script>
  <main class="app-container security-page">
    <header class="page-header"><div class="page-heading"><div class="page-kicker">个人账号</div><h1 class="page-title">账号安全</h1><p class="page-subtitle">独立维护当前登录账号的密码。</p></div></header>
    <section class="security-layout">
      <aside class="security-context"><h2>修改登录密码</h2><p>修改成功后，新密码会立即用于后续登录。请使用仅自己掌握的密码。</p><div class="account-identity"><span>当前账号</span><strong id="currentUsername">-</strong></div><div class="account-identity"><span>账号角色</span><strong id="currentRole">-</strong></div></aside>
      <div class="security-form">
        <form id="passwordForm" onsubmit="handleChangePassword(event)">
          <div class="form-group"><label class="form-label" for="oldPassword">当前密码</label><input class="form-input password-field" id="oldPassword" type="password" autocomplete="current-password" required></div>
          <div class="form-group"><label class="form-label" for="newPassword">新密码</label><input class="form-input password-field" id="newPassword" type="password" autocomplete="new-password" minlength="6" required></div>
          <div class="form-group"><label class="form-label" for="confirmPassword">确认新密码</label><input class="form-input password-field" id="confirmPassword" type="password" autocomplete="new-password" minlength="6" required></div>
          <div class="password-rule">新密码至少 6 个字符，两次输入必须一致。</div>
          <label class="show-passwords"><input id="showPasswords" type="checkbox" onchange="togglePasswords(this.checked)">显示输入的密码</label>
          <div class="security-actions"><button class="btn btn-primary" id="passwordSubmit" type="submit">更新密码</button><span class="security-message" id="passwordMessage" aria-live="polite"></span></div>
        </form>
      </div>
    </section>
  </main>
  <script src="/js/api.js"></script>
  <script>
    var passwordSubmitting=false;
    document.addEventListener('DOMContentLoaded',async function(){if(!await requireAuth())return;refreshNavCredits();document.getElementById('currentUsername').textContent=localStorage.getItem('ews_username')||'-';document.getElementById('currentRole').textContent=localStorage.getItem('ews_role')==='admin'?'管理员':'普通用户'});
    function togglePasswords(visible){document.querySelectorAll('.password-field').forEach(function(input){input.type=visible?'text':'password'})}
    function setMessage(message,type){var box=document.getElementById('passwordMessage');box.textContent=message||'';box.className='security-message '+(type||'')}
    function requestWithTimeout(promise){var timeoutId;var timeout=new Promise(function(_,reject){timeoutId=setTimeout(function(){reject(new Error('服务器超过120秒未响应，请稍后重试'))},120000)});return Promise.race([promise,timeout]).finally(function(){clearTimeout(timeoutId)})}
    async function handleChangePassword(event){
      event.preventDefault();if(passwordSubmitting)return;var oldPassword=document.getElementById('oldPassword').value;var newPassword=document.getElementById('newPassword').value;var confirmPassword=document.getElementById('confirmPassword').value;if(newPassword!==confirmPassword){setMessage('两次输入的新密码不一致','error');return}if(newPassword.length<6){setMessage('新密码不能少于 6 个字符','error');return}
      passwordSubmitting=true;var button=document.getElementById('passwordSubmit');button.disabled=true;button.classList.add('is-loading');button.textContent='更新中...';setMessage('');
      try{var result=await requestWithTimeout(API.changePassword(oldPassword,newPassword));if(!result.success)throw new Error(result.error||'密码修改失败');document.getElementById('passwordForm').reset();togglePasswords(false);setMessage('密码已更新','success');showToast(result.message||'密码修改成功','success')}catch(error){setMessage(error.message||'密码修改失败','error')}finally{passwordSubmitting=false;button.disabled=false;button.classList.remove('is-loading');button.textContent='更新密码'}
    }
  </script>
</body>
</html>
