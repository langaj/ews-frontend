function ep(epi){
  var authTag = epi.a ? '<span class="tag treq" style="background:#fef3c7;color:#92400e">需认证</span>' : '<span class="tag topt">无需认证</span>';
  var bodyHtml = epi.b ? '<details><summary style="cursor:pointer;font-size:13px;color:var(--gray-500);user-select:none">请求参数 (点击展开)</summary><table class="ftable" style="margin-top:8px">'+Object.entries(epi.b).map(function(e){return '<tr><td><code>'+e[0]+'</code></td><td>'+e[1]+'</td></tr>'}).join('')+'</table></details>' : '';
  return '<div class="endpoint"><div style="margin-bottom:4px"><span class="method m'+epi.m.toLowerCase()+'">'+epi.m+'</span><span class="epath">'+epi.p+'</span> '+authTag+'</div><div style="font-size:13px;color:var(--gray-600);margin-bottom:4px">'+epi.d+'</div>'+bodyHtml+'</div>';
}
function eps(keys){
  return keys.map(function(k){
    var sp=k.indexOf(' ');
    var m=k.slice(0,sp);
    var p=k.slice(sp+1);
    var item=EP.find(function(e){return e.m===m&&e.p===p});
    return item?ep(item):'';
  }).join('');
}

</pre>
<p>三个数据库命名空间互不干扰：<code>ews_</code> 共享层（用户、任务索引、配置），<code>ews_jst_</code> 聚水潭数据，<code>ews_shopee_</code> 虾皮数据。</p>

<h2 id="登录与验证">登录与验证</h2>

<pre>Authorization: Bearer {token}
Cookie: ews_token={token}</pre>
<p>登录成功返回的 <code>is_default_password</code> 为 <code>true</code> 时，建议立即修改密码。</p>

<h3>权限矩阵</h3>
<div class="note"><strong>角色：</strong>admin 可访问全部功能；user 只能操作自己的任务和查看任务列表。配置管理和用户管理仅 admin 可访问。</div>

<h2 id="配置">配置管理</h2>
${eps(['GET /api/config','PUT /api/config'])}
<div class="note"><strong>分平台配置：</strong>通过 <code>?platform=jst|shopee</code> 参数区分平台。更新时传 <code>_platform</code> 字段指定平台。<br>通用配置（如 r2_public_url、callback_secret）使用 <code>platform=''</code>，各平台的 webhook 地址通过 platform 参数隔离。推送体保持通用字段，系统内部根据 <code>task_id</code> 选择平台和对应 webhook 地址。</div>
<div class="note"><strong>n8n 开关：</strong><code>n8n_title_enabled</code>、<code>n8n_sku_title_enabled</code>、<code>n8n_sku_image_enabled</code> 分别控制商品标题、SKU标题、SKU图片，未配置时默认开启。关闭后系统不会构造对应新计划，并暂停同类历史 pending 计划；重新开启后历史 pending 继续释放。开启但 Webhook 地址为空时，推送接口会直接返回配置错误。<code>push_primary_images_only=true</code> 是最高优先级总开关，会同时跳过标题、SKU标题、详情图和SKU图片。Shopee 的 <code>variation_image_mode=none</code> 即使开启SKU图片工作流也不会创建SKU图片计划。</div>

<h2 id="状态机与算力">状态机与算力</h2>
<div class="note"><strong>回答确认：</strong>Shopee 已接入与 JST 对齐的推送计划状态机和算力扣减机制。外部接口保持通用，系统内部通过 <code>task_id</code> 查询 <code>ews_tasks.platform</code> 后选择对应平台表、资源记录和 webhook 地址。</div>
<h3>任务状态</h3>
<table class="ftable">
<tr><th>状态</th><th>含义</th><th>主要流转</th></tr>
<tr><td><code>init</code></td><td>已创建任务ID，尚未提交完整任务数据。</td><td><code>POST /api/tasks/init</code> 创建。</td></tr>

<tr><th>状态</th><th>触发条件</th><th>系统动作</th></tr>
<tr><td><code>pending</code></td><td>推送时系统按标题、SKU标题、封面图、附图、详情图、SKU图拆分计划。</td><td>写入 <code>ews_jst_push_plans</code> 或 <code>ews_shopee_push_plans</code>。</td></tr>
<tr><td><code>processing</code></td><td>队列释放计划前检查并扣减 1 点算力。</td><td>按 <code>webhook_type</code> 推送到对应平台配置的 webhook 地址。</td></tr>
<tr><td><code>done</code></td><td>工作流回调成功，标题或图片资源被系统保存。</td><td>图片会先下载到 R2，再写入对应平台资源表。</td></tr>
<tr><td><code>failed</code></td><td>Webhook 地址缺失、Webhook 即时失败、算力不足、资源下载失败且重试耗尽，或人工重试失败。</td><td>记录错误；地址缺失不扣算力，已扣算力但未成功派发或重试耗尽时会退还。</td></tr>
</table>
<div class="note"><strong>并发与补位：</strong><code>push_batch_size</code> 是单个平台单个任务的 processing 窗口；<code>push_global_max_active</code> 是所有平台、所有任务共享的全局 processing 上限，默认 20。<code>push_release_per_minute</code> 是全局每分钟最多新派发的工作流数量，默认 6；<code>push_release_per_task_per_minute</code> 是单任务每分钟新派发上限，默认 2。系统会同时检查活跃并发和每分钟释放额度，避免一次性补满并发打爆工作流或 D1。</div>
<div class="note"><strong>通用推送体：</strong>n8n 工作流不需要接收或回传 <code>platform</code>。标题、图片、SKU 等工作流只需要使用 <code>task_id</code>、<code>sub_task_id</code>、<code>image_type</code>、<code>image_position</code>、<code>callback_url</code> 和 <code>callback_secret</code> 等通用字段。平台差异由 EWS 内部根据 <code>task_id</code> 调度和落库。</div>

<h2 id="JST任务">JST 任务</h2>
${eps(['POST /api/tasks/:id/push','GET /api/tasks/:id/plans','POST /api/tasks/:id/plans/:planId/retry','GET /api/tasks/:id/export'])}
<div class="note"><strong>推送流程：</strong>创建任务 init → 上传图片 → updateTask 提交完整数据 → pushTask 触发推送。<br>推送后系统创建子任务（款式编码）和推送计划，通过 releaseTaskQueue 动态补位（并发上限 batch_size）。<br>全量模式每套生成完整资源；去重模式第 2 套开始只生成主图，其余附图/详情图/SKU图在导出时复用第 1 套。</div>
<div class="note"><strong>阶段性图片优先：</strong>当 <code>push_primary_images_only=true</code> 时，系统只构造 <code>main/main_1</code> 和 <code>sub_*</code> 主图/附图计划；标题、SKU标题、详情图、SKU图不会创建计划。关闭总开关只影响之后重新推送或重新生成的任务，不会自动补建历史任务计划。</div>

<h2 id="Shopee商品">Shopee 商品</h2>
${eps(['POST /api/tasks/:id/push','GET /api/tasks/:id/plans','POST /api/tasks/:id/plans/:planId/retry','GET /api/tasks/:id/export'])}
<div class="note"><strong>Shopee 推送：</strong>已与 JST 对齐，支持标题、SKU 标题、封面图、附图、详情图、SKU 图工作流。默认 <code>main_image_count=9</code>（1封面+8附图），默认 <code>detail_image_count=0</code>；只有详情图数量大于 0 时才要求并触发详情图 webhook。去重模式第 2 套开始只生成封面图，其余图片复用第 1 套。</div>
<div class="note"><strong>标题结构：</strong>Shopee 商品标题工作流按“主关键词 + 副关键词 + 长尾词 + 属性词”生成自然越南语标题，最终结果不包含字段括号；每个标题必须为 10~120 字符。SKU 标题对应模板的 <code>Option for Variation 1</code>，必须为 1~20 字符。</div>

<h2 id="回调">回调接口</h2>
${eps(['POST /api/callback'])}
<div class="note"><strong>回调地址：</strong><code>POST ${API_ROOT}/api/callback</code><br><strong>验证：</strong><code>body.secret</code> 或 <code>body.callback_secret</code> 等于系统 <code>callback_secret</code><br><strong>处理方式：</strong>回调先写入共享队列 <code>ews_callback_queue</code>，接口返回 <code>queued:true</code> 后由 Worker 后台消费。若 D1 队列写入失败，接口返回 <code>503</code>、<code>success:false</code>、<code>retryable:true</code>，工作流应等待后重试。标题类回调会直接落库；图片类回调会再写入 <code>ews_image_queue</code>，由 Worker 按活跃数限流下载图片并写入 R2。处理完成会删除队列记录；处理失败会保留记录并重试，超过次数后标记 failed。<br><strong>当前限流：</strong>回调队列默认最多 3 个活跃处理任务，单轮最多消费 3 条；图片队列默认最多 6 个活跃处理任务，单轮最多消费 6 条，可通过 <code>image_queue_max_active</code> 和 <code>image_queue_batch_size</code> 调整。<br><strong>标题校验：</strong>titles 长度必须 = sub_task_count<br><strong>SKU标题校验：</strong>sku_titles 长度必须 = sub_task_count × variant_count</div>

<h3>回调字段</h3>
<table class="ftable">
<tr><th>字段</th><th>说明</th></tr>
<tr><td><code>secret</code></td><td>回调密钥；与 <code>callback_secret</code> 二选一 <span class="tag treq">必填</span></td></tr>
<tr><td><code>callback_secret</code></td><td>回调密钥别名；与 <code>secret</code> 二选一 <span class="tag treq">必填</span></td></tr>
<tr><td><code>task_id</code></td><td>母任务ID <span class="tag treq">必填</span></td></tr>
<tr><td><code>sub_task_id</code></td><td>子任务ID；图片回调必填，直接从推送体原样带回</td></tr>
<tr><td><code>set_index</code></td><td>子任务索引；建议原样带回，系统会以 <code>sub_task_id</code> 查询出的索引为准并自动校准</td></tr>
<tr><td><code>titles</code></td><td>[string] 标题数组，按索引匹配子任务</td></tr>
<tr><td><code>product_title</code></td><td>string 单个标题，应用到全部</td></tr>
<tr><td><code>sku_titles</code></td><td>[string] SKU标题，按 sub_task 顺序 × 推送体 variants 顺序映射；Shopee新任务由系统向同一一级规格的二级组合复用</td></tr>
<tr><td><code>image_type</code></td><td>'main'|'sub'|'detail'|'sku'</td></tr>
<tr><td><code>image_position</code></td><td>number (1~N)</td></tr>
<tr><td><code>image_url</code></td><td>AI模型临时URL</td></tr>
<tr><td><code>error</code></td><td>图片生成失败原因；图片工作流失败时可传，系统会按计划重试</td></tr>
</table>

<h3>n8n 回调示例</h3>
<div class="note"><strong>返回判断：</strong>n8n 调用 <code>callback_url</code> 后，HTTP 200 且 <code>success:true</code>、<code>queued:true</code> 表示 EWS 已接收；若返回 <code>503</code> 且 <code>retryable:true</code>，n8n 应等待后重试同一回调。图片 URL 可以是工作流生成的临时公网 URL，EWS 会下载、转存到 R2 并落库。</div>
<h4>标题成功回调</h4>
<pre>{
  "secret": "{{$json.callback_secret}}",
  "task_id": "{{$json.task_id}}",
  "titles": ["标题1", "标题2"]
}</pre>
<h4>SKU标题成功回调</h4>
<pre>{
  "secret": "{{$json.callback_secret}}",
  "task_id": "{{$json.task_id}}",
  "sku_titles": ["子任务1变体1", "子任务1变体2", "子任务2变体1", "子任务2变体2"]
}</pre>
<h4>图片成功回调</h4>
<pre>{
  "secret": "{{$json.callback_secret}}",
  "task_id": "{{$json.task_id}}",
  "sub_task_id": "{{$json.sub_task_id}}",
  "set_index": {{$json.set_index}},
  "image_type": "{{$json.image_type}}",
  "image_position": {{$json.image_position}},
  "image_url": "https://example.com/generated.jpg"
}</pre>
<h4>图片失败回调</h4>
<pre>{
  "secret": "{{$json.callback_secret}}",
  "task_id": "{{$json.task_id}}",
  "sub_task_id": "{{$json.sub_task_id}}",
  "set_index": {{$json.set_index}},
  "image_type": "{{$json.image_type}}",
  "image_position": {{$json.image_position}},
  "error": "AI生成失败或URL不可用"
}</pre>

<h2 id="上传">上传</h2>
${eps(['POST /api/upload','GET /r2/*'])}
<div class="note">支持 JPG/PNG/WebP/GIF，单文件 ≤10MB。R2 路径格式：<code>ews/{task_id}/{folder}/{uuid}.jpg</code>。</div>

<h2 id="用户管理">用户管理</h2>
${eps(['GET /api/users','POST /api/users','PUT /api/users/:id/toggle','PUT /api/users/:id/reset-password','DELETE /api/users/:id','PUT /api/users/:id/platform','GET /api/users/:id/webhook','PUT /api/users/:id/webhook','GET /api/users/me/credits','PUT /api/users/:id/credits'])}
<div class="note"><strong>用户工作流配置：</strong>JSON 格式 <code>{"jst":{"n8n_title_enabled":false,...}, "shopee":{...}}</code>。用户级非空 Webhook 覆盖全局地址，空字符串按继承处理；三个开关可传布尔值 <code>true/false</code>，省略字段表示继承平台全局开关。系统按任务所有者应用配置，管理员代为推送或重试也不会切换成管理员配置。读取和修改接口仅管理员可用。</div>

<h2 id="标题类">标题类 Webhook 推送体</h2>
${WEBHOOKS.slice(0,2).map(function(w){
  return '<h4>'+w.name+' → <code>'+w.key+'</code></h4><div class="note">'+w.note+'</div><pre>'+JSON.stringify(w.body,null,2)+'</pre>';

<h2 id="图片类">图片类 Webhook 推送体</h2>
<div class="note"><strong>架构：</strong>主图/封面图(第1张)→主图工作流，附图(第2~N张)→附图工作流，详情图(第1~M张)→详情图工作流。每张图独立推送。JST 默认 N=5、M=5；Shopee 默认 N=9、M=0。两平台去重模式下第 2 套开始只推主图/封面图。</div>
${WEBHOOKS.slice(2).map(function(w){
  return '<h4>'+w.name+' → <code>'+w.key+'</code></h4><div class="note">'+w.note+'</div><pre>'+JSON.stringify(w.body,null,2)+'</pre>';
}).join('')}

<h2 id="聚水潭导出">聚水潭导出格式（22列）</h2>
<p>导出接口 <code>GET /api/tasks/:id/export</code> 为 JST 任务时返回以下列：</p>
<pre>款式编码 | 商品编码 | 颜色 | 规格 | 商品主图(JSON数组) | 商品详情图(JSON数组) | 图片地址 | 商品名称 | 推荐文案 | 商品描述 | 宝贝链接 | 库存 | 重量(kg) | 基本售价 | 市场/吊牌价 | 最低分销控价 | 最高分销控价 | 供应商名 | 3:4主图 | 长图 | 透明素材图 | 白底图</pre>
<div class="note">JST 导出前会阻断缺失 AI 资源：每套必须有商品标题、主图/附图、详情图；每个变体必须有 SKU 标题和 SKU 变体图。去重模式下第 2 套开始复用第 1 套的附图、详情图和 SKU 图。</div>

<h2 id="Shopee导出">Shopee 导出格式（A~AP 42列）</h2>
<p>导出接口 <code>GET /api/tasks/:id/export</code> 为 Shopee 任务时返回 <code>export_format:'shopee'</code>，前端会写入官方 basic template 的 <code>Template</code> 工作表第 7 行开始。当前列顺序：</p>
<pre>Category | Product Name | Product Description | Max Purchase Qty | MaxPQ Start Date | MaxPQ Time Period | MaxPQ End Date | Parent SKU | Variation Integration No. | Variation Name1 | Option for Variation 1 | Image per Variation | Variation Name2 | Option for Variation 2 | Price | Stock | SKU | Size Chart Template | Size Chart Image | GTIN | Cover image | Item Image 1 | Item Image 2 | Item Image 3 | Item Image 4 | Item Image 5 | Item Image 6 | Item Image 7 | Item Image 8 | Weight | Length | Width | Height | Shipping(5000) | Shipping(5001) | Shipping(5004) | Shipping(5012) | Shipping(5115) | Shipping(50039) | Shipping(50052) | Pre-order DTS | Fail Reason</pre>
<div class="note">Shopee 导出前会阻断缺失 AI 资源：每套必须有封面图和配置数量内的附图；每个变体必须有 SKU 标题和 SKU 变体图。详情图当前 basic template 没有字段，默认不导出，可通过任务列表打包下载。</div>

<h2 id="表结构">表结构</h2>
<h4>共享层 (ews_)</h4>
<pre>ews_config      (key, value, platform)  — 分平台配置
ews_users       (id, username, password_hash, role, credits, webhook_config)
ews_tasks       (id, platform, name, status, user_id)  — 统一任务索引
ews_callback_queue — 共享回调队列（成功处理后删除，失败保留重试）
ews_image_queue    — 共享图片处理队列（限制下载/R2写入并发）</pre>

<h4>聚水潭 (ews_jst_)</h4>
<pre>ews_jst_tasks       — 任务扩展信息（图片数量、模式等）
ews_jst_sub_tasks   — 子任务（款式编码）
ews_jst_variants    — 变体（二维规格：tier1/tier2，含 price_float_enabled/price_min/price_max/price_precision）
ews_jst_sku_titles  — SKU标题
ews_jst_task_images — 图片记录
ews_jst_push_plans  — 推送计划（状态机）
ews_jst_export_records — 导出记录</pre>

<h4>虾皮 (ews_shopee_)</h4>
<pre>ews_shopee_products     — 商品（分类、图片、物流等）
ews_shopee_variations   — 变体（二维规格，含 price_float_enabled/price_min/price_max/price_precision）
ews_shopee_sub_tasks    — 子任务（一套链接/一套商品资源）
ews_shopee_task_images  — 图片记录
ews_shopee_sku_titles   — SKU标题
ews_shopee_push_plans   — 推送计划（状态机）
ews_shopee_export_records — 导出记录</pre>
