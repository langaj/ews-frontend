function ep(epi){
  var authTag = epi.a ? '<span class="tag treq" style="background:#fef3c7;color:#92400e">需认证</span>' : '<span class="tag topt">无需认证</span>';
  var bodyHtml = epi.b ? '<details><summary style="cursor:pointer;font-size:13px;color:var(--gray-500);user-select:none">请求参数 (点击展开)</summary><table class="ftable" style="margin-top:8px">'+Object.entries(epi.b).map(function(e){return '<tr><td><code>'+e[0]+'</code></td><td>'+e[1]+'</td></tr>'}).join('')+'</table></details>' : '';
  return '<div class="endpoint"><div style="margin-bottom:4px"><span class="method m'+epi.m.toLowerCase()+'">'+epi.m+'</span><span class="epath">'+epi.p+'</span> '+authTag+'</div><div style="font-size:13px;color:var(--gray-600);margin-bottom:4px">'+epi.d+'</div>'+bodyHtml+'</div>';
}
function eps(keys){
  return keys.map(function(k){
    var sp=k.indexOf(' ');
    var m=k.slice(0,sp);
    var p=k.slice(sp+1);
    var item=EP.find(function(e){return e.m===m&&e.p===p});
    return item?ep(item):'';
  }).join('');
}

document.getElementById('content').innerHTML = `
<div class="doc-hero"><div class="page-kicker">Developer Reference</div><h1>API 与工作流文档</h1><p>面向工作流开发与系统集成，平台路由由任务 ID 在服务端自动完成。</p></div>
<h2 id="系统架构">系统架构</h2>
<p>EWS 聚合系统，支持 <strong>聚水潭(JST)</strong> 和 <strong>虾皮(Shopee)</strong> 双平台。</p>
<pre style="line-height:1.4">
[前端] ews.langaj.cn  ──────→  [后端] ewsz.langaj.cc  ───→  D1 数据库 (baseapac)
                                    │                      ├── ews_ (共享层)
                                    │                      ├── ews_jst_ (聚水潭)
                                    │                      └── ews_shopee_ (虾皮)
                                    │
                                    ├──→ R2 存储 (ossapac) 路径: ews/{task_id}/
                                    └──→ n8n 工作流 (标题/主图/附图/详情图/SKU图)
</pre>
<p>三个数据库命名空间互不干扰：<code>ews_</code> 共享层（用户、任务索引、配置），<code>ews_jst_</code> 聚水潭数据，<code>ews_shopee_</code> 虾皮数据。</p>

<h2 id="登录与验证">登录与验证</h2>
<p>使用 JWT Token（24小时有效），所有接口（除登录、验证、回调、ping、R2外）需在请求头或Cookie中携带Token。</p>
<pre>Authorization: Bearer {token}
Cookie: ews_token={token}</pre>
<p>登录成功返回的 <code>is_default_password</code> 为 <code>true</code> 时，建议立即修改密码。</p>

<h3>权限矩阵</h3>
<div class="note"><strong>角色：</strong>admin 可访问全部功能；user 只能操作自己的任务和查看任务列表。配置管理和用户管理仅 admin 可访问。</div>

<h2 id="配置">配置管理</h2>
${eps(['GET /api/config','PUT /api/config'])}
<div class="note"><strong>分平台配置：</strong>通过 <code>?platform=jst|shopee</code> 参数区分平台。更新时传 <code>_platform</code> 字段指定平台。<br>通用配置（如 r2_public_url、callback_secret）使用 <code>platform=''</code>，各平台的 webhook 地址通过 platform 参数隔离。推送体保持通用字段，系统内部根据 <code>task_id</code> 选择平台和对应 webhook 地址。</div>
<div class="note"><strong>n8n 开关：</strong><code>n8n_title_enabled</code> 控制当前平台的商品元数据，JST 的商品标题、推荐文案、商品描述与 SKU 标题由同一工作流生成；<code>n8n_sku_image_enabled</code> 只控制 <code>variation_image_mode=ai</code> 的 SKU 图片。自上传模式不构造 SKU 图片计划。关闭后系统不构造对应计划，并暂停同类 pending 计划；重新开启后继续释放。开启但 Webhook 地址为空时，推送接口直接返回配置错误。<code>push_primary_images_only=true</code> 是最高优先级总开关，会跳过元数据、详情图和SKU图片。</div>

<h2 id="任务(通用)">任务(通用)</h2>
${eps(['GET /api/tasks','POST /api/tasks/init','GET /api/tasks/:id','PUT /api/tasks/:id','DELETE /api/tasks/:id','PUT /api/tasks/:id/status'])}
<div class="note"><strong>任务ID体系：</strong>JST 和 Shopee 共用同一套 8 字符 <code>task_id</code>。平台归属只保存在系统内部的 <code>ews_tasks.platform</code>，外部推送、回调和导出接口都以 <code>task_id</code> 为路由键。</div>
<h3>双平台 updateTask 路由规则</h3>
<div class="note">同一个 <code>PUT /api/tasks/:id</code> 会先读取 <code>ews_tasks.platform</code>，再进入 JST 或 Shopee 的保存逻辑。调用方不需要额外传平台字段，但必须先用 <code>POST /api/tasks/init</code> 创建正确平台的任务。</div>
<h4>JST 请求体核心字段</h4>
<pre>{
  "name": "任务名称",
  "topic_items": "参考标题",
  "source_brief": "商品事实，10~2000字符",
  "product_link": "https://商品链接",
  "supplier_name": "供应商名",
  "main_description": "主图描述",
  "detail_description": "详情图描述",
  "reference_image": "R2 URL",
  "auxiliary_images": "[R2 URL...]",
  "generate_count": 1,
  "mode": "full|dedup",
  "main_image_count": 5,
  "detail_image_count": 5,
  "stock": 999,
  "weight": 1,
  "product_type": "single|one|two",
  "variation_image_mode": "upload|ai",
  "variants": [{
    "tier1_name": "颜色",
    "tier1_value": "红色",
    "tier2_name": "规格",
    "tier2_value": "M",
    "sku_image": "R2 URL",
    "stock": 999,
    "sku_code": "RED-M",
    "price": 99,
    "min_distribution_price": 89,
    "max_distribution_price": 109,
    "sku_description": "展示买二送三，一共到手5个",
    "price_float_enabled": 0,
    "price_min": null,
    "price_max": null,
    "price_precision": 0
  }]
}</pre>
<div class="note"><strong>JST：</strong><code>name</code> 只作内部任务备注，<code>topic_items</code> 为可选参考标题。<code>source_brief</code> 是商品元数据 AI 的事实边界，不进入 SKU 图片工作流。<code>product_type=single</code> 只能传一条空规格 SKU；<code>one</code> 使用一级规格；<code>two</code> 可省略不售卖组合。非空 <code>sku_code</code> 在任务内必须唯一且最多 71 字符，系统导出时添加 8 位随机 ID 和连字符，总长度不超过 80。每个一级规格必须且只能上传一张 <code>sku_image</code>：<code>upload</code> 直接导出该 R2 URL；<code>ai</code> 将其作为唯一图片输入，并可填写最多 300 字符的 <code>sku_description</code>，同一一级规格的二维组合共用提示词和结果图。只需通过 <code>price</code> 或价格浮动字段提供基本售价；<code>market_price</code> 无需传，旧请求中的该字段会被忽略，导出时市场|吊牌价自动与最终基本售价一致。</div>
<h4>Shopee 请求体核心字段</h4>
<pre>{

<h2 id="状态机与算力">状态机与算力</h2>
<div class="note"><strong>回答确认：</strong>Shopee 已接入与 JST 对齐的推送计划状态机和算力扣减机制。外部接口保持通用，系统内部通过 <code>task_id</code> 查询 <code>ews_tasks.platform</code> 后选择对应平台表、资源记录和 webhook 地址。</div>
<h3>任务状态</h3>
<table class="ftable">
<tr><th>状态</th><th>含义</th><th>主要流转</th></tr>
<tr><td><code>init</code></td><td>已创建任务ID，尚未提交完整任务数据。</td><td><code>POST /api/tasks/init</code> 创建。</td></tr>
<tr><td><code>pending</code></td><td>任务数据已保存，等待触发推送。</td><td><code>PUT /api/tasks/:id</code> 保存后进入。</td></tr>
<tr><td><code>processing</code></td><td>已创建子任务和推送计划，队列正在释放到不同工作流地址。</td><td><code>POST /api/tasks/:id/push</code> 后进入。</td></tr>
<tr><td><code>partial_failed</code></td><td>至少一条推送计划失败，但仍存在 pending/processing 计划或可继续处理的任务；系统会继续推进其他计划。</td><td>修复元数据或图片 webhook 后，在任务列表点击继续或在详情中重试失败计划。</td></tr>
<tr><td><code>completed</code></td><td>子任务资源完成且无待处理推送计划。</td><td>回调保存标题/图片后由系统检查完成度。</td></tr>
<tr><td><code>failed</code></td><td>任务进入最终失败，通常表示已无 pending/processing 计划但仍存在 failed 计划。</td><td>查看推送计划失败原因后重试，重试成功会恢复 processing 并继续释放队列。</td></tr>
</table>
<h3>推送计划状态机</h3>
<table class="ftable">
<tr><th>状态</th><th>触发条件</th><th>系统动作</th></tr>
<tr><td><code>pending</code></td><td>新计划，或可重试错误进入30/120/300秒退避等待。</td><td>达到 <code>next_retry_at</code> 后重新参加用户公平调度。</td></tr>
<tr><td><code>processing</code></td><td>队列释放计划前检查并扣减 1 点算力。</td><td>按 <code>webhook_type</code> 推送到对应平台配置的 webhook 地址。</td></tr>
<tr><td><code>done</code></td><td>工作流回调成功，标题或图片资源被系统保存。</td><td>图片服务直传 R2；Queue consumer 校验对象后写入对应平台资源表。</td></tr>
<tr><td><code>failed</code></td><td>永久错误、算力不足，或自动重试3次后仍失败。</td><td>记录最终错误；已扣算力会退还，用户仍可人工重试。</td></tr>
</table>
<div class="note"><strong>并发与补位：</strong>系统不设置跨用户的全局 processing 上限。<code>main/main_1</code>、<code>sub_*</code>、<code>detail_*</code>、<code>sku_数字</code> 统一计入任务所有者的图片并发额度；JST 与 Shopee 跨平台合并统计，默认且最高为 20。JST <code>metadata</code> 不占图片额度，但为避免大模型请求挤压，每用户同时最多处理 2 个批次；每批最多 10 套商品且最多 100 个 SKU 标题。</div>
<div class="note"><strong>通用推送体：</strong>n8n 工作流不需要接收或回传 <code>platform</code>。系统会在所有新推送体中增加 <code>plan_id</code> 和 <code>workflow_type</code>，回调与错误回调应原样带回；平台差异由 EWS 内部根据 <code>task_id</code> 调度和落库。</div>

<h2 id="JST任务">JST 任务</h2>
${eps(['POST /api/tasks/:id/push','GET /api/tasks/:id/plans','POST /api/tasks/:id/plans/:planId/retry','GET /api/tasks/:id/export'])}
<div class="note"><strong>推送流程：</strong>创建任务 init → 上传图片 → updateTask 提交完整数据 → pushTask 触发推送。<br>推送后系统创建子任务（款式编码）和推送计划。商品元数据按动态批次一次生成每套商品标题、推荐文案、商品描述和全部 SKU 标题；每个批次以 <code>plan_id</code> 精确回调，并通过 JSON1 批量写入 D1。AI 模式的 SKU 图片只按唯一一级规格生成，二维规格复用一级规格图；自上传模式不创建 SKU 图片计划。<br>全量模式每套生成完整资源；去重模式第 2 套开始只生成主图，其余 AI 附图/详情图/SKU图在导出时复用第 1 套。</div>
<div class="note"><strong>失败重试：</strong>网络异常、HTTP 408/425/429/5xx、工作流900秒超时错误回调、Worker 20分钟无回调兜底及其他临时错误会自动重试3次，退避时间为30/120/300秒。Webhook缺失、HTTP 400/401/403/404和 <code>retryable:false</code> 直接失败。任务详情仍支持单条或全部人工重试；<code>processing</code> 计划拒绝重复提交。正式推送会先按实际计划数量预检用户算力，余额不足时不会创建子任务或推送计划。</div>
<div class="note"><strong>阶段性图片优先：</strong>当 <code>push_primary_images_only=true</code> 时，系统只构造 <code>main/main_1</code> 和 <code>sub_*</code> 主图/附图计划；商品元数据、详情图、SKU图不会创建计划。关闭总开关只影响之后重新推送或重新生成的任务，不会自动补建已有任务计划。</div>

<h2 id="Shopee商品">Shopee 商品</h2>
${eps(['POST /api/tasks/:id/push','GET /api/tasks/:id/plans','POST /api/tasks/:id/plans/:planId/retry','GET /api/tasks/:id/export'])}
<div class="note"><strong>Shopee 推送：</strong>任务支持商品元数据、封面图、附图和 AI 模式的 SKU 图工作流，不构造 SKU 标题与详情图计划。自上传模式直接保存并导出 R2 SKU 图片 URL，不创建 SKU 图片计划。商品图固定为 9 张（1封面+8附图），<code>detail_image_count</code> 固定为 0。去重模式下每套仍生成独立封面，第 2 套开始复用第 1 套的 8 张附图与 AI SKU 图。</div>
<div class="note"><strong>商品元数据：</strong>工作流按“主关键词 + 副关键词 + 长尾词 + 属性词”生成每套自然越南语 Product Name，同时生成 100~3000 字符 Product Description，并将用户规格规范为模板的 Variation Name / Option。规格标签是商品属性，不是营销式 SKU 标题；同一一级规格在二维组合中必须保持相同标签。</div>

<h2 id="回调">回调接口</h2>
${eps(['POST /api/callback','POST /api/internal/r2-upload-ticket'])}
<div class="note"><strong>回调地址：</strong><code>POST ${API_ROOT}/api/callback</code><br><strong>验证：</strong><code>body.secret</code> 或 <code>body.callback_secret</code> 等于系统 <code>callback_secret</code><br><strong>处理方式：</strong>回调直接写入原生 Cloudflare Queue <code>ews-callback-events</code>。只有 <code>send()</code> 成功后才返回 <code>queued:true</code>；写入失败返回 <code>503</code>、<code>success:false</code>、<code>retryable:true</code>，调用方应等待后重试。Queue 采用单跳消费、最多重试 5 次和 DLQ，成功处理具备幂等性。超过 48KB 的聚合元数据正文暂存 R2 inbox，Queue 只传 key，消费成功或最终失败后删除。旧 D1 表 <code>ews_callback_queue</code>、<code>ews_image_queue</code> 仅用于排空历史记录。<br><strong>图片直传：</strong>n8n 将模型临时 URL 提交到 Fastify 图片服务，服务写入 BullMQ/Valkey 后立即返回 <code>202</code>。独立 Sharp Worker 转为 quality 88 JPEG，超过 1.9MB 时再 Bilinear 等比缩小，并使用同一个 <code>callback_secret</code> 请求单对象 PUT 票据直传 R2。最终成功或失败 callback 均由图片服务负责，n8n 不等待处理结果。R2 长期凭据只保存在 Worker secret，不进入推送体、图片服务或 D1。<br><strong>Shopee 校验：</strong>products 数量必须等于子任务数，每项 Product Name 10~120 字符、Product Description 100~3000 字符；variation_labels 必须完整保留变体 ID 和组合数量。</div>

<h3>R2 上传票据</h3>
<div class="note"><code>POST /api/internal/r2-upload-ticket</code> 仅供可信图片服务调用。请求携带现有 <code>callback_secret</code>、任务/计划/图片定位字段、<code>image/jpeg</code>、字节数和 SHA-256。系统验证计划处于 <code>processing</code> 后返回只允许写入当前计划对象的 presigned PUT URL、必需 headers、<code>r2_key</code>、过期时间和最大体积。它不会返回 R2 Access Key 或 Secret Access Key。</div>

<h3>回调字段</h3>
<table class="ftable">
<tr><th>字段</th><th>说明</th></tr>
<tr><td><code>secret</code></td><td>回调密钥；与 <code>callback_secret</code> 二选一 <span class="tag treq">必填</span></td></tr>
<tr><td><code>callback_secret</code></td><td>回调密钥别名；与 <code>secret</code> 二选一 <span class="tag treq">必填</span></td></tr>
<tr><td><code>task_id</code></td><td>母任务ID <span class="tag treq">必填</span></td></tr>
<tr><td><code>plan_id</code></td><td>精确推送计划ID；JST <code>metadata</code> 成功或失败回调必填，其他新版工作流建议原样带回</td></tr>
<tr><td><code>workflow_type</code></td><td>推送计划类型；系统推送时自动提供，错误回调必须原样带回</td></tr>
<tr><td><code>sub_task_id</code></td><td>子任务ID；图片回调必填，直接从推送体原样带回</td></tr>
<tr><td><code>set_index</code></td><td>子任务索引；建议原样带回，系统会以 <code>sub_task_id</code> 查询出的索引为准并自动校准</td></tr>
<tr><td><code>sku_titles</code></td><td>仅用于 JST 的每个 <code>products</code> 元素：<code>[{variant_id,title}]</code>；不接受顶层字段</td></tr>
<tr><td><code>products</code></td><td>JST：<code>[{sub_task_id,product_title,recommended_copy,product_description,sku_titles}]</code>；Shopee：<code>[{sub_task_id,product_name,product_description}]</code></td></tr>
<tr><td><code>variation_labels</code></td><td>Shopee 规格标签：<code>{name1,name2,values:[{id,option1,option2}]}</code>；无规格商品传空名称和空数组</td></tr>
<tr><td><code>image_type</code></td><td>'main'|'sub'|'detail'|'sku'</td></tr>
<tr><td><code>image_position</code></td><td>number (1~N)</td></tr>
<tr><td><code>r2_key</code></td><td>图片成功回调必填；图片服务直传后返回的 R2 对象键</td></tr>
<tr><td><code>sha256</code></td><td>图片成功回调必填；64位小写十六进制摘要，用于核对 R2 metadata</td></tr>
<tr><td><code>size_bytes</code></td><td>图片字节数；当前上限 1,900,000 bytes</td></tr>
<tr><td><code>content_type</code></td><td>图片直传固定为 <code>image/jpeg</code></td></tr>
<tr><td><code>image_url</code></td><td>旧版图片回调兼容字段；新版工作流不再使用</td></tr>
<tr><td><code>error</code></td><td>工作流失败原因；默认进入自动重试</td></tr>
<tr><td><code>retryable</code></td><td>boolean；错误确定无法恢复时传 <code>false</code>，系统直接标记失败</td></tr>
</table>

<h2 id="图片处理服务">图片处理服务</h2>
<div class="note"><strong>基础地址：</strong>由部署环境决定；同主机 Docker 默认使用 <code>http://ews-image-sidecar:3000</code>，跨主机必须使用受 TLS 保护的外部地址。该服务不是 Worker 路由，不使用 <code>${API_ROOT}</code>。<br><strong>职责：</strong>Fastify 只负责鉴权和持久入队，BullMQ/Valkey 削峰，Sharp Worker 执行下载、JPEG 转码、必要时等比缩小、R2 直传和最终 callback。</div>
<table class="ftable">
<tr><th>方法</th><th>路径</th><th>鉴权</th><th>说明</th></tr>
<tr><td><code>POST</code></td><td><code>/v1/image-jobs</code></td><td>body.callback_secret</td><td>持久化图片任务，成功返回 HTTP 202</td></tr>
<tr><td><code>GET</code></td><td><code>/healthz</code></td><td>无</td><td>API 进程存活检查</td></tr>
<tr><td><code>GET</code></td><td><code>/readyz</code></td><td>无</td><td>Valkey 就绪检查</td></tr>
<tr><td><code>GET</code></td><td><code>/v1/image-jobs/:jobId</code></td><td>Bearer callback_secret</td><td>查询 BullMQ 任务状态</td></tr>
<tr><td><code>POST</code></td><td><code>/v1/image-jobs/:jobId/retry</code></td><td>Bearer callback_secret</td><td>重试 BullMQ failed 任务</td></tr>
<tr><td><code>GET</code></td><td><code>/v1/stats</code></td><td>Bearer callback_secret</td><td>查询等待、活动、完成和失败数量</td></tr>
</table>
<h3>异步入队请求</h3>
<pre>{
  "source_url": "模型生成的临时图片URL",
  "ticket_url": "${API_ROOT}/api/internal/r2-upload-ticket",
  "callback_secret": "v3",
  "task_id": "母任务ID",
  "plan_id": "图片计划ID",
  "sub_task_id": "子任务ID",
  "set_index": 0,
  "image_type": "main|sub|detail|sku",
  "image_position": 1
}</pre>
<div class="note"><strong>响应语义：</strong><code>202</code> 表示 Valkey 已持久接收；同一 <code>plan_id + source_url</code> 活动任务只入队一次，已完成任务重复提交时仅重放 callback。<code>401</code> 为密钥失败且不可重试，<code>429</code> 表示队列满并携带 <code>Retry-After: 30</code>，<code>503</code> 表示 Valkey 或服务暂时不可用。n8n 收到 <code>202</code> 后必须结束当前执行，不再发送图片成功回调。</div>

<h2 id="上传">上传</h2>
${eps(['POST /api/upload'])}
<div class="note">普通上传支持 JPG/PNG/WebP/GIF，单文件 ≤10MB，并保留原始字节、MIME 和对应扩展名。<code>folder=sku-upload</code> 仅接受 JPG/PNG，Worker 会统一编码为 quality 88 JPEG；首次结果超过 2,000,000 bytes 时只进行一次 Bilinear 等比缩小，仍超限则返回 400。<code>reference</code>、<code>auxiliary</code>、<code>sku-reference</code> 不转码、不压缩。R2 路径格式：<code>ews/{task_id}/{folder}/{uuid}.{ext}</code>。成功响应增加 <code>content_type</code>、<code>size_bytes</code>，SKU 成品图另含 <code>image_processing</code>。所有任务接口仅允许任务所有者访问，管理员例外；越权返回 403。</div>

<h2 id="用户管理">用户管理</h2>
${eps(['GET /api/users','POST /api/users','PUT /api/users/:id/toggle','PUT /api/users/:id/reset-password','DELETE /api/users/:id','PUT /api/users/:id/platform','PUT /api/users/:id/concurrency','GET /api/users/:id/webhook','PUT /api/users/:id/webhook','GET /api/users/me/credits','PUT /api/users/:id/credits'])}
<div class="note"><strong>用户工作流配置：</strong>JSON 格式 <code>{"jst":{"n8n_title_enabled":false,...}, "shopee":{...}}</code>。用户级非空 Webhook 覆盖全局地址，空字符串按继承处理；<code>n8n_title_enabled</code> 与 <code>n8n_sku_image_enabled</code> 可传布尔值，省略字段表示继承平台全局开关。系统按任务所有者应用配置。</div>

<h2 id="图片类">图片类 Webhook 推送体</h2>
<div class="note"><strong>架构：</strong>主图/封面图(第1张)进入主图工作流，附图(第2~N张)进入附图工作流，每张图独立推送。JST 的 N/M 可设 1~9，默认 5/5；Shopee 固定 N=9、M=0，不构造详情图。两平台去重模式下第 2 套开始只推主图/封面图。全部 v3 图片工作流以 900 秒为单次生成截止时间；创建请求失败、轮询失败、服务返回失败或成功但没有 URL 时都会主动回调 <code>error</code>。Worker 的 <code>push_plan_timeout_minutes</code> 默认且最小为 20 分钟，为工作流错误回调和内部队列预留缓冲。</div>
${WEBHOOKS.slice(2).map(function(w){

<h2 id="聚水潭导出">聚水潭导出格式（22列）</h2>
<p>导出接口 <code>GET /api/tasks/:id/export</code> 为 JST 任务时返回 <code>export_format:'jst'</code> 和二维 <code>rows</code>。前端载入 <code>/templates/聚水潭_商品模板.xlsx</code>，保留第 1 行说明和第 2 行表头，从第 3 行写入：</p>
<pre>款式编码 | 商品编码 | 颜色 | 规格 | 商品主图(JSON数组) | 商品详情图(JSON数组) | 图片地址 | 商品名称 | 推荐文案 | 商品描述 | 宝贝链接 | 库存 | 重量(kg) | 基本售价 | 市场/吊牌价 | 最低分销控价 | 最高分销控价 | 供应商名 | 3:4主图 | 长图 | 透明素材图 | 白底图</pre>
<div class="note">模板要求款式编码、商品编码、商品名称必填，库存、重量和价格保持数值类型。市场|吊牌价由系统自动复制最终基本售价；启用价格浮动时，同一导出行的两列使用同一个取值。导出只校验当前任务实际构造过的 AI 计划：已构造但尚未回调的元数据或图片会阻断。SKU 图片自上传模式直接使用 <code>sku_image</code>，AI 模式使用生成图。去重模式第 2 套开始复用第 1 套的 AI 附图、详情图和 SKU 图。</div>

<h2 id="Shopee导出">Shopee 全局模板库导出</h2>
<p>用户通过 <code>GET /api/shopee/template-profiles</code> 查看所有已启用的全局模板档案及最近更新者，通过 <code>POST /api/shopee/template-profiles</code> 上传 Seller Centre 下载的最新 Basic Template。新上下文可直接创建，已有档案允许任意登录用户更新。任务更新接口携带 <code>template_profile_id</code>，导出始终优先读取档案当前最新版。</p>
<p><code>GET /api/tasks/:id/export</code> 对 Shopee 任务直接返回 <code>application/vnd.openxmlformats-officedocument.spreadsheetml.sheet</code> 文件。Worker 扫描全部工作表，按隐藏 token 锚点推导商品工作表、元数据行、规则行和数据起始行，再把系统语义字段写入原始工作簿。</p>
<div class="note">Shopee 导出前会阻断缺失 AI 资源：每套必须有 Product Name、Product Description、封面图和 8 张附图；规格商品必须有规范化规格标签，AI 生成模式下每个一级规格必须有 SKU 变体图。自上传模式直接使用用户图片 URL。Weight 按每条 SKU 的 <code>weight_kg</code> 从 kg 转为 g。物流渠道、列数和列顺序全部从用户模板解析，新增物流列无需改代码。模板没有详情图字段，任务图片可通过任务列表打包下载。</div>

<h3>Shopee 全局模板库接口</h3>
<pre>GET    /api/shopee/template-profiles
POST   /api/shopee/template-profiles       multipart/form-data: alias, note, is_favorite, file, profile_id(更新现有档案时必传，任意登录用户可用)
       上传内容命中上一版本时返回 409，code=SHOPEE_TEMPLATE_ROLLBACK_BLOCKED
GET    /api/shopee/template-profiles/:id   返回 latest_updated_by、当前版本 uploaded_by、分类目录、物流渠道；管理员额外获得当前/上一版本、动态差异和字段映射
PUT    /api/shopee/template-profiles/:id/meta
       JSON: {"alias":"个人别名","note":"仅自己可见","is_favorite":true}
PUT    /api/shopee/template-profiles/:id   管理员更新系统名称、状态或批准版本
PUT    /api/shopee/template-profiles/:id/versions/:versionId/fields/:token
       管理员 JSON: {"semantic_key":"ps_product_name"}
DELETE /api/shopee/template-profiles/:id   管理员软删除；历史任务仍可导出</pre>
<div class="note">档案按 <code>UNIQUE(market, store_context_id)</code> 去重，D2 仅称为 <code>store_context_id</code>，不宣称为官方 Shop ID。上传接口对全部工作表单元格内容规范化后计算指纹，覆盖官方签名、字段规则、分类/DTS、物流和隐藏表，原始比较内容不落库：与当前版本一致时返回 <code>unchanged:true</code> 且不新增版本或 R2 对象；与上一版本一致时返回 <code>409 SHOPEE_TEMPLATE_ROLLBACK_BLOCKED</code> 并阻止回退；其他变化返回 <code>updated:true</code>，新文件成为当前版本。每个档案最多保留当前和上一版本，更早版本的 D1 子记录与 R2 文件自动清理，管理页比较结果实时生成而不额外落库。</div>

<h2 id="表结构">表结构</h2>
<h4>共享层 (ews_)</h4>
<pre>ews_config      (key, value, platform)  - 分平台配置
ews_users       (id, username, password_hash, role, credits, webhook_config)
ews_tasks       (id, platform, name, status, user_id)  - 统一任务索引
ews_callback_queue - 旧版D1回调队列（仅排空历史记录）
ews_image_queue    - 旧版D1图片队列（仅排空历史记录）
ews_shopee_template_profiles   - 全局模板档案，按 market + store_context_id 唯一
ews_shopee_template_versions   - 当前与上一模板、R2 Key、SHA256、语义指纹（每档案最多2条）
ews_shopee_template_user_meta  - 用户私有别名、备注和收藏
ews_shopee_template_fields     - token 类型、必填性和语义映射</pre>

<h4>聚水潭 (ews_jst_)</h4>
<pre>ews_jst_tasks       - 任务扩展信息（内部备注、商品事实、模板字段、图片数量等）
ews_jst_sub_tasks   - 子任务（款式编码、商品标题、推荐文案、商品描述）
ews_jst_variants    - SKU组合（二维规格、库存、SKU、四类模板价格、价格浮动、一级规格参考图）
ews_jst_sku_titles  - SKU标题
ews_jst_task_images - 图片记录
ews_jst_push_plans  - 推送计划（状态机）
ews_jst_export_records - 导出记录</pre>

<h4>虾皮 (ews_shopee_)</h4>
<pre>ews_shopee_products     - 商品（分类、图片、物流、product_type等）
ews_shopee_variations   - 变体（原始规格、导出规格、价格浮动）
ews_shopee_sub_tasks    - 子任务（每套 Product Name、Product Description）
ews_shopee_task_images  - 图片记录
ews_shopee_push_plans   - 推送计划（状态机）
ews_shopee_export_records - 导出记录</pre>
